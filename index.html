// Fetch AISWEB page and scrape data
async function getAiswebData(icao){
  const empty={rwyLen:null,rwyWid:null,hasIfr:false,hasSid:false,hasStar:false,fireCat:null,pcn:null,oprType:null,hasNight:false,elevFt:null,adHr:null,hasTwr:false,runways:[]};
  try{
    const raw=await proxyFetchRaw(`https://aisweb.decea.mil.br/?i=aerodromos&codigo=${icao}`);
    if(!raw)return empty;
    const clean=raw.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
    // SID/STAR
    empty.hasSid=/\bSID\b/i.test(clean);
    empty.hasStar=/\bSTAR\b/i.test(clean);
    // IFR
    empty.hasIfr=/\bIFR\b/i.test(clean);
    // VFR only
    if(/VFR\s+somente|somente\s+VFR/i.test(clean))empty.oprType='VFR';
    else if(empty.hasIfr)empty.oprType='VFR/IFR';
    // Night ops
    empty.hasNight=/noturno|ilumina/i.test(clean);
    // Tower
    empty.hasTwr=/\bTWR\b/i.test(clean);
    // Runway dimensions
    const rwyMatch=clean.match(/(\d{3,4})\s*x\s*(\d{2,3})/);
    if(rwyMatch){empty.rwyLen=parseInt(rwyMatch[1]);empty.rwyWid=parseInt(rwyMatch[2]);}
    // PCN
    const pcnMatch=clean.match(/PCN\s+([^\s,]+(?:\/[^\s,]+)*)/i);
    if(pcnMatch)empty.pcn=pcnMatch[1];
    // Fire category
    const fireMatch=clean.match(/(?:CAT|categoria)[^0-9]*(\d+)/i);
    if(fireMatch)empty.fireCat=fireMatch[1];
    // Elevation
    const elevMatch=clean.match(/(\d{1,5})\s*(?:FT|ft|pés)/);
    if(elevMatch)empty.elevFt=elevMatch[1];
    return empty;
  }catch(e){return empty;}
}

// Check REC needed (same criteria as bot)
function checkRecNeeded(len,wid,hasIfr,oprType){
  const reasons=[];
  if(len!=null&&len<=1800)reasons.push(`Pista com ${len}m (≤ 1.800m)`);
  if(wid!=null&&wid<45)reasons.push(`Largura ${wid}m (< 45m)`);
  if(!hasIfr)reasons.push('Sem procedimentos IFR');
  if(oprType&&!/IFR/i.test(oprType)&&!reasons.includes('Sem procedimentos IFR'))reasons.push('Aeródromo somente VFR');
  return{needed:reasons.length>0,reasons};
}

// PCN tire pressure category
function getPcnTireCat(pcn){
  if(!pcn)return null;
  const m=pcn.replace(/\s/g,'').toUpperCase().match(/\d+\/[FR]\/[ABCD]\/([WXYZ])\/[TURS]/);
  if(m)return m[1];
  const parts=pcn.toUpperCase().replace(/\s/g,'').split('/');
  if(parts.length>=4&&'WXYZ'.includes(parts[3]))return parts[3];
  return null;
}

// Fetch FAB fuel from CELOG planilha
async function fetchFabFuel(icao){
  try{
    const r=await fetchWithTimeout(CELOG_CSV,10000);
    if(!r.ok)return{hasFuel:false,text:'Consulta indisponível'};
    const csv=await r.text();
    const rows=parseCSV(csv);
    // Header: CHAVE(0),ICAO(1),LOCALIDADE(2),UF(3),REGIÃO(4),COMBUSTÍVEL(5),OBSERVAÇÕES(6),CONTRATO(7),VIGÊNCIA(8),EMPRESA(9),PREÇO ATUAL(10)
    const found=rows.filter(row=>(row[1]||'').trim().toUpperCase()===icao);
    if(found.length){
      const suspended=found.some(r=>(r[6]||'').toUpperCase().includes('SUSPENSO'));
      if(suspended)return{hasFuel:false,text:'Contrato FAB temporariamente suspenso',rows:found};
      return{hasFuel:true,text:'Possui contrato FAB para abastecimento',rows:found};
    }
    return{hasFuel:false,text:'Não possui contrato FAB para abastecimento'};
  }catch(e){return{hasFuel:false,text:'Consulta indisponível'};}
}

function parsePlanArgs(input){
  const items=input.trim().toUpperCase().split(/\s+/);
  let speed=450;
  if(items.length&&/^\d{2,3}$/.test(items[items.length-1])){speed=parseInt(items.pop());}
  const icaos=[],groundTimes=[];
  for(const item of items){
    const tm=item.match(/^(\d{1,2}):(\d{2})$/);
    if(tm){
      const h=parseInt(tm[1])+parseInt(tm[2])/60;
      if(groundTimes.length)groundTimes[groundTimes.length-1]=h;
    }else{
      icaos.push(item);
      groundTimes.push(1.0);
    }
  }
  return{icaos,groundTimes,speed};
}

async function botExecPlan(){
  const input=(document.getElementById('planRoute')?.value||'').trim();
  if(!input){document.getElementById('planResult').innerHTML='<div style="color:var(--red)">Preencha as localidades</div>';return;}
  const result=document.getElementById('planResult');
  const{icaos,groundTimes,speed}=parsePlanArgs(input);
  if(icaos.length<2){result.innerHTML='<div style="color:var(--red)">Informe pelo menos 2 localidades.</div>';return;}
  // Check international
  const brPfx=['SB','SD','SN','SS','SW','SI','SJ'];
  const intlIcaos=icaos.filter(ic=>!brPfx.some(p=>ic.startsWith(p)));
  if(intlIcaos.length){
    result.innerHTML=`<div style="font-weight:900;color:var(--vc1);margin-bottom:8px">🌍 Localidade Internacional Detectada</div>
<div>✈️ Rota: ${icaos.join(' → ')}<br>🔸 Internacional: ${intlIcaos.join(', ')}<br><br>⚠️ <i>Localidade internacional. Favor solicitar que a Subseção de Navegação do Primeiro Esquadrão utilize o ARINC para maiores informações.</i></div>`;
    return;
  }
  result.innerHTML='<div style="color:var(--vc1)">📝 Planejando voo... aguarde.</div>';
  try{
    // Get all coords
    const coordsArr=await Promise.all(icaos.map(ic=>getAirportCoords(ic)));
    for(let i=0;i<icaos.length;i++){
      if(!coordsArr[i]){result.innerHTML=`❌ Aeroporto <b>${icaos[i]}</b> não encontrado.`;return;}
    }
    // Calculate legs
    const legs=[];let totalFlightH=0,totalGroundH=0,totalDist=0;
    for(let i=0;i<icaos.length-1;i++){
      const c1=coordsArr[i],c2=coordsArr[i+1];
      const dist=haversine(c1.lat,c1.lon,c2.lat,c2.lon);
      const cruiseH=dist/speed;
      const[oData,dData]=await Promise.all([getAiswebData(icaos[i]),getAiswebData(icaos[i+1])]);
      const depAdd=oData.hasSid?10/60:0;
      const arrAdd=dData.hasStar?10/60:0;
      const flightH=cruiseH+depAdd+arrAdd;
      const gndH=i<icaos.length-2?groundTimes[i+1]:0;
      legs.push({orig:icaos[i],dest:icaos[i+1],dist,flightH,gndH});
      totalFlightH+=flightH;totalGroundH+=gndH;totalDist+=dist;
    }
    const totalH=totalFlightH+totalGroundH;
    // Build output
    let html=`<div style="font-weight:900;color:var(--vc1);margin-bottom:8px">📝 PLANEJAMENTO DE VOO</div>`;
    html+=`<div style="border-top:2px solid var(--border);padding-top:8px">`;
    html+=`<div>✈️ <b>ROTA:</b> ${icaos.join(' → ')}</div>`;
    html+=`<div>⚡ Velocidade: <b>${speed} kt</b></div><br>`;
    html+=`<div><b>PERNAS:</b></div>`;
    legs.forEach(l=>{
      html+=`<div>&nbsp;&nbsp;✈️ ${l.orig} → ${l.dest}: <b>${formatTime(l.flightH)}</b> (${l.dist.toFixed(0)} NM)</div>`;
      if(l.gndH>0)html+=`<div>&nbsp;&nbsp;🔄 Solo em ${l.dest}: ${formatTime(l.gndH)}</div>`;
    });
    html+=`<br><div>📏 Distância total: <b>${totalDist.toFixed(0)} NM</b> (${(totalDist*1.852).toFixed(0)} km)</div>`;
    html+=`<div>⏱ Voo total: <b>${formatTime(totalFlightH)}</b></div>`;
    html+=`<div>🔄 Solo total: <b>${formatTime(totalGroundH)}</b></div>`;
    html+=`<div>✅ <b>Tempo total: ${formatTime(totalH)}</b></div>`;
    html+=`</div>`;
    // METAR + TAF (usando proxyFetchRaw para TAF)
    const uniqueIcaos=[...new Set(icaos)];
    const planMetars={},planTafs={};
    html+=`<div style="border-top:2px solid var(--border);margin-top:12px;padding-top:8px">`;
    html+=`<div style="font-weight:900;margin-bottom:6px">🌤 METAR</div>`;

// ---- Msg Padrão (same as bot /planejamento — SBBR round trip) ----
function botMsgPadrao(){
  let html=`<div style="font-weight:900;color:var(--vc1);margin-bottom:12px">📄 Mensagem Padrão</div>`;
  html+=`<div style="font-size:.78rem;color:var(--text2);margin-bottom:12px">Informe o destino (origem fixa: SBBR):<br><code>SBZM</code> ou <code>SBZM 450</code></div>`;
  html+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
  html+=`<input id="msgDest" type="text" placeholder="SBZM" maxlength="4" style="width:120px;background:var(--bg);border:1px solid var(--border);color:var(--vc1);padding:10px 14px;border-radius:6px;font-family:inherit;font-size:.9rem;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">`;
  html+=`<input id="msgSpeed" type="number" placeholder="450" value="450" style="width:80px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-family:inherit;font-size:.9rem">`;
  html+=`<button onclick="botExecMsgPadrao()" style="background:var(--vc1);color:var(--bg);border:none;padding:10px 20px;border-radius:6px;font-family:inherit;font-weight:900;cursor:pointer">🔍 CONSULTAR</button>`;
  html+=`</div>`;
  html+=`<div id="msgResult" style="margin-top:16px"></div>`;
  botOut(html,false);
}

async function botExecMsgPadrao(){
  const dest=(document.getElementById('msgDest')?.value||'').trim().toUpperCase();
  const speed=parseInt(document.getElementById('msgSpeed')?.value||'450')||450;
  const orig='SBBR';
  if(!dest||dest.length<4){document.getElementById('msgResult').innerHTML='<div style="color:var(--red)">Informe o ICAO do destino</div>';return;}
  const result=document.getElementById('msgResult');
  result.innerHTML='<div style="color:var(--vc1)">Processando planejamento... aguarde.</div>';
  try{
    const[c1,c2]=await Promise.all([getAirportCoords(orig),getAirportCoords(dest)]);
    if(!c2){result.innerHTML=`Aeroporto <b>${dest}</b> não encontrado.`;return;}
    const dist=haversine(c1.lat,c1.lon,c2.lat,c2.lon);
    const cruiseH=dist/speed;
    // AISWEB data
    const[origAis,destAis]=await Promise.all([getAiswebData(orig),getAiswebData(dest)]);
    const idaH=cruiseH+(origAis.hasSid?10/60:0)+(destAis.hasStar?10/60:0);
    const voltaH=cruiseH+(destAis.hasSid?10/60:0)+(origAis.hasStar?10/60:0);
    // Fuel
    const fuel=await fetchFabFuel(dest);
    // REC
    const rec=checkRecNeeded(destAis.rwyLen,destAis.rwyWid,destAis.hasIfr,destAis.oprType);
    // PCN tire pressure
    const tireCat=getPcnTireCat(destAis.pcn);
    // NOTAMs (runway filter)
    let notamAlert='NOTAM OK';
    const notamRaw=await proxyFetchRaw(`https://aviationweather.gov/api/data/notam?ids=${dest}&format=raw`).catch(()=>'');
    if(notamRaw){
      const rwyNotams=notamRaw.split(/\n{2,}/).filter(n=>/\b(?:RWY|RUNWAY|PISTA|CLSD|CLOSED|REDUCED)\b/i.test(n));
      if(rwyNotams.length)notamAlert=rwyNotams.map(n=>n.trim().substring(0,100)).join('; ');
    }
    // Build message
    let lines=[];
    lines.push(`<b>Operação em ${dest}</b>`);
    lines.push('');
    lines.push(`${orig}-${dest}: ${formatTime(idaH)}`);
    lines.push(`${dest}-${orig}: ${formatTime(voltaH)}`);
    lines.push('');
    // Pista
    if(destAis.rwyLen)lines.push(`- Pista: ${destAis.rwyLen}x${destAis.rwyWid}${destAis.pcn?' (PCN '+destAis.pcn+')':''}`);
    else lines.push(`- Pista: dados não encontrados (<a href="https://aisweb.decea.mil.br/?i=aerodromos&codigo=${dest}" target="_blank" style="color:var(--vc1)">AISWEB</a>)`);
    if(destAis.elevFt)lines.push(`- Altitude ${destAis.elevFt}FT`);
    if(destAis.fireCat)lines.push(`- Categoria Contra Incêndio: CAT ${destAis.fireCat}`);
    else lines.push(`- Categoria Contra Incêndio: não encontrado`);
    if(destAis.adHr)lines.push(`- ${destAis.adHr}`);
    lines.push(destAis.hasTwr?'- Possui torre (TWR)':'- Não possui rádio/torre');
    lines.push(`- Operação: ${destAis.oprType||'VFR'}`);
    lines.push(destAis.hasNight?'- Opera diurno e noturno':'- Opera somente diurno (sem iluminação de pista)');
    lines.push(`- ${fuel.text}`);
    lines.push(`- ${notamAlert}`);
    lines.push(rec.needed?`- Necessita missão de REC (${rec.reasons.join('; ')})`:'- Não necessita missão de REC');
    // VC-1
    lines.push('');lines.push('<b>VC-1</b>');lines.push('');
    lines.push(rec.needed?'- Necessita missão de REC':'- Não necessita missão de REC');
    if(tireCat&&tireCat!=='W'&&tireCat!=='X')lines.push(`- Não opera VC-1 devido pressão dos pneus (categoria ${tireCat})`);
    const pcnNum=destAis.pcn?parseInt(destAis.pcn):null;
    if(pcnNum&&pcnNum<=30)lines.push(`- PCN BAIXO ATENÇÃO! (PCN ${pcnNum})`);
    // VC-2
    lines.push('');lines.push('<b>VC-2</b>');lines.push('');
    lines.push(rec.needed?'- Necessita missão de REC':'- Não necessita missão de REC');

    const plainText=lines.join('\n').replace(/<b>|<\/b>/g,'').replace(/<a[^>]*>([^<]*)<\/a>/g,'$1').replace(/<[^>]+>/g,'');
    result.innerHTML=`<div style="white-space:pre-line;line-height:1.7">${lines.join('\n')}</div>
<button onclick="navigator.clipboard.writeText(this.dataset.txt).then(()=>{this.textContent='✅ Copiado!';setTimeout(()=>this.textContent='📋 COPIAR MENSAGEM',2000)})" data-txt="${plainText.replace(/"/g,'&quot;')}" style="margin-top:12px;background:var(--green);color:#fff;border:none;padding:10px 24px;border-radius:6px;font-family:inherit;font-weight:900;cursor:pointer;font-size:.85rem">📋 COPIAR MENSAGEM</button>
<div style="margin-top:8px;font-size:.72rem;color:var(--text2)">${DISCLAIMER}</div>`;
  }catch(e){result.innerHTML=`<div style="color:var(--red)">❌ Erro: ${e.message}</div>`;}
}

// Robust status tracking
const STATUS_SOURCES=[
  {id:'disp',label:'Disponibilidade',critical:true},
  {id:'lanc',label:'Lançamentos',critical:true},
  {id:'ferias',label:'Férias',critical:false},
  {id:'previsao',label:'Previsão Missões',critical:false},
  {id:'plan',label:'Planejamento',critical:false},
  {id:'acnt',label:'ACNT/ALTR',critical:false},
  {id:'metar',label:'METAR',critical:false},
  {id:'metarMulti',label:'METAR Multi',critical:false},
  {id:'anual',label:'Horas Anual',critical:true},
  {id:'om',label:'Ordens de Missão',critical:false},
  {id:'escala',label:'Escala',critical:false},
  {id:'cartoes',label:'Cartões',critical:false},
  {id:'pauSebo',label:'Pau de Sebo',critical:false},
  {id:'brAirports',label:'Aeroportos BR',critical:false},
];
let sourceStatus={};
let lastLoadTime=null;
function updateStatusPanel(){
  const dot=document.getElementById('statusDot');
  const panel=document.getElementById('statusPanel');
  const total=STATUS_SOURCES.length;
  const okCount=STATUS_SOURCES.filter(s=>sourceStatus[s.id]==='ok').length;
  const failCount=STATUS_SOURCES.filter(s=>sourceStatus[s.id]==='fail').length;
  const criticalFail=STATUS_SOURCES.filter(s=>s.critical&&sourceStatus[s.id]==='fail');
  const nowTxt=new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  // Determine dot color
  if(criticalFail.length){
    dot.className='status-dot err';
  }else if(failCount>0){
    dot.className='status-dot warn';
  }else{
    dot.className='status-dot ok';
  }
  // Build panel
  let html=`<div style="font-weight:900;margin-bottom:8px;color:var(--vc1);font-size:.82rem">📊 Status do Sistema</div>`;
  html+=`<div style="margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">`;
  html+=`<span style="color:${failCount===0?'var(--green)':criticalFail.length?'var(--red)':'var(--yellow)'};font-weight:700">${okCount}/${total} fontes OK</span>`;
  html+=`<span style="float:right;color:var(--text2)">${nowTxt}</span></div>`;
  STATUS_SOURCES.forEach(s=>{
    const st=sourceStatus[s.id]||'pending';
    const icon=st==='ok'?'sp-ok':st==='fail'?'sp-fail':'sp-na';
    const label=st==='ok'?'✅':st==='fail'?'❌':'⏳';
    const crit=s.critical?'<span style="color:var(--red);font-size:.6rem;margin-left:4px">●</span>':'';
    html+=`<div class="sp-row"><span><span class="sp-icon ${icon}"></span>${s.label}${crit}</span><span>${label}</span></div>`;
  });
  // Data quality checks
  html+=`<div style="margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-weight:700;color:var(--vc1)">Integridade</div>`;
  const checks=[];
  if(pilotData&&pilotData.length)checks.push({ok:true,txt:`${pilotData.length} tripulantes`});
  else checks.push({ok:false,txt:'0 tripulantes carregados'});
  if(flights&&flights.length)checks.push({ok:true,txt:`${flights.length} voos registrados`});
  else checks.push({ok:false,txt:'0 voos registrados'});
  if(Object.keys(BR_AIRPORTS).length>0)checks.push({ok:true,txt:`${Object.keys(BR_AIRPORTS).length} aeroportos`});
  else checks.push({ok:false,txt:'Base aeroportos não carregou'});
  if(cartoesData&&cartoesData.length)checks.push({ok:true,txt:`${cartoesData.length} cartões`});
  else if(cartoesFailed)checks.push({ok:false,txt:'Cartões indisponíveis'});
  const metarCount=Object.keys(metarMulti||{}).length;
  checks.push({ok:metarCount>=4,txt:`${metarCount}/4 METARs`});
  checks.forEach(c=>{
    html+=`<div class="sp-row"><span><span class="sp-icon ${c.ok?'sp-ok':'sp-fail'}"></span>${c.txt}</span></div>`;
  });
  // Stale data warning
  if(lastLoadTime){
    const ageMin=Math.round((Date.now()-lastLoadTime)/60000);
    if(ageMin>6)html+=`<div style="margin-top:6px;color:var(--yellow);font-size:.7rem">⚠️ Dados com ${ageMin}min — próximo refresh automático em breve</div>`;
  }
  html+=`<div style="margin-top:8px;font-size:.6rem;color:var(--text2)">● = fonte crítica | Clique fora para fechar</div>`;
  panel.innerHTML=html;
}
// Close panel on outside click
document.addEventListener('click',e=>{
  const panel=document.getElementById('statusPanel');
  const dot=document.getElementById('statusDot');
  if(panel&&!panel.contains(e.target)&&e.target!==dot)panel.classList.remove('open');
});
async function loadAllData(){
  document.getElementById('errorOverlay').style.display='none';
  document.getElementById('loadingMsg').style.display='block';
  const dot=document.getElementById('statusDot');
  dot.className='status-dot loading';
  sourceStatus={};STATUS_SOURCES.forEach(s=>sourceStatus[s.id]='pending');
  try{
    const metarFetch=fetchMetar().then(()=>{sourceStatus.metar='ok';}).catch(()=>{sourceStatus.metar='fail';});
    const metarMultiFetch=fetchMetarMulti().then(()=>{sourceStatus.metarMulti='ok';}).catch(()=>{sourceStatus.metarMulti='fail';});
    const planFetch=fetchWithTimeout(planCsvUrl()).then(r=>r.ok?r.text():'').then(t=>{sourceStatus.plan='ok';return t?parseCSV(t):[];}).catch(()=>{sourceStatus.plan='fail';return[];});
    const acntFetch=fetchWithTimeout(`https://docs.google.com/spreadsheets/d/${PLAN_SHEET}/export?format=csv&gid=${GIDS.acnt}`).then(r=>r.ok?r.text():'').then(t=>{sourceStatus.acnt='ok';return t?parseCSV(t):[];}).catch(()=>{sourceStatus.acnt='fail';return[];});
    const[dispRows,lancRows,ferRows,prevRows,planRows,acntRows]=await Promise.all([
      fetchCSV(GIDS.disp).then(r=>{sourceStatus.disp='ok';return r;}).catch(()=>{sourceStatus.disp='fail';return[];}),
      fetchCSV(GIDS.lanc).then(r=>{sourceStatus.lanc='ok';return r;}).catch(()=>{sourceStatus.lanc='fail';return[];}),
      fetchCSVByName('Férias').then(r=>{sourceStatus.ferias='ok';return r;}).catch(()=>{sourceStatus.ferias='fail';return[];}),
      fetchCSV(GIDS.previsao).then(r=>{sourceStatus.previsao='ok';return r;}).catch(()=>{sourceStatus.previsao='fail';return[];}),
      planFetch,acntFetch]);
    await metarFetch;
    await metarMultiFetch;
    // Check individual METAR localities
    const expectedIcaos=['SBBR','SBCF','SBRJ','SBSP'];
    const missingIcaos=expectedIcaos.filter(i=>!metarMulti[i]);
    if(missingIcaos.length&&sourceStatus.metarMulti==='ok')sourceStatus.metarMulti='fail';
    await fetchAnual().then(()=>{sourceStatus.anual='ok';}).catch(()=>{sourceStatus.anual='fail';});
    await fetchWithTimeout('om_data.json?v='+Date.now()).then(r=>r.ok?r.json():[]).then(d=>{omData=d;sourceStatus.om='ok';}).catch(()=>{omData=[];sourceStatus.om='fail';});
    await fetchEscala().then(()=>{sourceStatus.escala='ok';}).catch(()=>{sourceStatus.escala='fail';});
    await fetchCSVByName('cartões').then(rows=>{cartoesData=parseCartoes(rows);cartoesFailed=false;sourceStatus.cartoes='ok';}).catch(()=>{cartoesData=[];cartoesFailed=true;sourceStatus.cartoes='fail';});
    pilotData=parseDisponibilidade(dispRows);
    flights=parseLancamentos(lancRows);
    await fetchPauDeSebo().then(()=>{sourceStatus.pauSebo='ok';}).catch(()=>{sourceStatus.pauSebo='fail';});
    calcAfastamentos();
    feriasData=parseFerias(ferRows);missionsData=parsePrevisaoMissoes(prevRows);
    diarioData=parseDiario(planRows);
    acntData=parseACNT(acntRows);
    sourceStatus.brAirports=Object.keys(BR_AIRPORTS).length>0?'ok':'fail';
    lastLoadTime=Date.now();
    const nowTxt=new Date().toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdate').textContent='Atualizado '+nowTxt;
    updateStatusPanel();
    checklistData=parseChecklist(planRows);
    renderAll();
  }catch(e){
    console.error(e);
    dot.className='status-dot err';
    updateStatusPanel();
    document.getElementById('errorOverlay').style.display='flex';
    document.getElementById('loadingMsg').style.display='none';
  }
}

let escalaUnlocked=false;
function goScreen(n){
  if(n===8&&!escalaUnlocked){
    const pw=prompt('🔒 Área restrita. Digite a senha:');
    if(!pw){return;}
    async function verifyPw(p){const enc=new TextEncoder().encode(p);const buf=await crypto.subtle.digest('SHA-256',enc);return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
    verifyPw(pw).then(h=>{if(h==='eb9eaaaaf29e9838c97791fbf68ac2483f2aa3f93c6dc39c6bf0162cc51a6322'){escalaUnlocked=true;goScreen(8);}else{alert('Senha incorreta.');}});
    return;
  }
  currentScreen=n;document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id==='screen'+n));document.querySelectorAll('.nav-btns button').forEach(b=>b.classList.toggle('active',b.id==='btn'+n));
  // Fechar menu mobile ao trocar de tela
  const nav=document.querySelector('.nav-btns');if(nav)nav.classList.remove('open');
  const hb=document.getElementById('hamburgerBtn');if(hb)hb.textContent='☰ MENU';
  // Modo BI: esconde header/nav/footer na tela TV
  const isTV=n===9;
  document.querySelector('header').style.display=isTV?'none':'';
  document.querySelector('footer').style.display=isTV?'none':'';
}
function goFullscreen(){document.documentElement.requestFullscreen?.();}
function updateClock(){const d=new Date();const opts={timeZone:'America/Sao_Paulo'};const wd=d.toLocaleDateString('pt-BR',{...opts,weekday:'long'});const day=d.toLocaleDateString('pt-BR',{...opts,day:'numeric'});const mon=d.toLocaleDateString('pt-BR',{...opts,month:'long'});const yr=d.toLocaleDateString('pt-BR',{...opts,year:'numeric'});const time=d.toLocaleTimeString('pt-BR',{...opts,hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById('clock').textContent=`${wd}, ${day} de ${mon} de ${yr} — ${time}`;}
let _clockInterval,_dataInterval,_codeInterval;
updateClock();_clockInterval=setInterval(updateClock,1000);
loadAllData();_dataInterval=setInterval(loadAllData,300000);
// Auto-update: verifica se o código mudou a cada 5min e recarrega
let _codeHash='';
async function checkCodeUpdate(){
  try{
    const r=await fetch(location.pathname+'?_ck='+Date.now(),{cache:'no-store',method:'HEAD'});
    const len=r.headers.get('content-length')||'';const mod=r.headers.get('last-modified')||'';
    const sig=len+'|'+mod;
    if(!_codeHash){_codeHash=sig;return;}
    if(sig!==_codeHash){console.log('SisGOPA: nova versão detectada, recarregando...');location.reload();}
  }catch(e){}
}
checkCodeUpdate();_codeInterval=setInterval(checkCodeUpdate,300000);
goScreen(0);
</script>
