<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SisGOPA — Gestão de Operações Aéreas</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1a2332;
  --vc1:#00d4ff;--vc2:#00ff88;
  --red:#ff4444;--yellow:#ffaa00;--green:#00ff88;--orange:#ff8800;
  --text:#e0e6ed;--text2:#8899aa;--border:#1e2d3d;
  --glow1:rgba(0,212,255,.15);--glow2:rgba(0,255,136,.15);
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Consolas','Courier New',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;flex-wrap:wrap}
.nav-btns{display:flex;gap:6px;flex-wrap:wrap;order:10;width:100%;justify-content:center;padding-top:6px;border-top:1px solid var(--border);margin-top:4px}
.hamburger-btn{display:none}
.nav-btns button{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:8px 14px;cursor:pointer;font-family:inherit;font-size:.85rem;border-radius:4px;transition:.2s;white-space:nowrap}
.nav-btns button:hover,.nav-btns button.active{background:var(--vc1);color:var(--bg);border-color:var(--vc1)}
.header-right{display:flex;align-items:center;gap:10px;font-size:.85rem;white-space:nowrap}
.clock{color:var(--vc1);font-size:1rem;font-weight:800}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;background:#444;cursor:pointer;position:relative;transition:background .3s}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.warn{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
.status-dot.err{background:var(--red);box-shadow:0 0 6px var(--red);animation:dotPulse 1s ease-in-out infinite}
.status-dot.loading{background:#888;animation:dotPulse 1s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
.status-panel{display:none;position:absolute;bottom:calc(100% + 10px);right:0;background:#1a2233;color:var(--text);font-size:.72rem;padding:12px 16px;border-radius:8px;border:1px solid var(--border);z-index:9999;min-width:260px;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.5);line-height:1.6}
.status-panel.open{display:block}
.status-panel .sp-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.status-panel .sp-row:last-child{border-bottom:none}
.status-panel .sp-icon{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.status-panel .sp-ok{background:var(--green)}.status-panel .sp-fail{background:var(--red)}.status-panel .sp-na{background:#555}
@keyframes tvBlink{0%,100%{opacity:1}50%{opacity:.2}}
.tv-blink{animation:tvBlink 1s ease-in-out infinite}
@keyframes horasGlow{0%,100%{text-shadow:0 0 10px rgba(0,212,255,.4),0 0 20px rgba(0,212,255,.2)}50%{text-shadow:0 0 20px rgba(0,212,255,.8),0 0 40px rgba(0,212,255,.4),0 0 60px rgba(0,255,136,.2)}}
#tvTotalHoras{animation:horasGlow 3s ease-in-out infinite}
.ctrl-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:.8rem;border-radius:3px}
.ctrl-btn:hover{border-color:var(--vc1);color:var(--vc1)}

main{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;padding:18px;opacity:0;pointer-events:none;transition:opacity .6s;overflow:auto}
.screen.active{opacity:1;pointer-events:auto}
.screen::-webkit-scrollbar{width:6px}
.screen::-webkit-scrollbar-track{background:var(--bg)}
.screen::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

h2{font-size:1.3rem;margin-bottom:14px;color:var(--vc1);text-transform:uppercase;letter-spacing:1px}
h2.vc2{color:var(--vc2)}
h3{font-size:1.05rem;margin:16px 0 10px;color:var(--text2);border-bottom:1px solid var(--border);padding-bottom:4px}

/* Pilot cards */
.pilot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.pilot-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center;border-left:4px solid var(--border)}
.pilot-card .trigrama{font-size:1.4rem;font-weight:900;margin-bottom:2px}
.pilot-card .name{font-size:.78rem;color:var(--text2);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pilot-card .opr{font-size:.72rem;color:var(--text2)}
.pilot-card .meta{font-size:.72rem;color:var(--text2);margin-top:2px}
.pilot-card .status{font-size:.82rem;font-weight:900;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:6px}
.st-apto{background:#0a3a1a;color:var(--green);border:1px solid var(--green)}
.st-inapto{background:#3a0a0a;color:var(--red);border:1px solid var(--red)}
.st-ferias{background:#3a2a0a;color:var(--orange);border:1px solid var(--orange)}
.st-afastado{background:#3a0a0a;color:var(--red);border:1px solid var(--red)}
.st-warning{background:#3a3a0a;color:var(--orange);border:1px solid var(--orange)}
.st-ext{background:#101a2a;color:#8ea3ff;border:1px solid #5169d8}
.st-out{background:#1a1a1a;color:#888;border:1px solid #444}
.card-vc1{border-left-color:var(--vc1)}
.card-vc2{border-left-color:var(--vc2)}

/* Hours bars */
.hours-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:980px){.hours-cols{grid-template-columns:1fr}}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.88rem}
.bar-label{width:58px;text-align:right;font-weight:900;flex-shrink:0}
.bar-name{width:120px;font-size:.72rem;color:var(--text2);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:3px;position:relative;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:2px;transition:width .5s}
.bar-pct{width:60px;text-align:right;font-size:.82rem;flex-shrink:0}
.bar-hours{font-size:.72rem;color:var(--text2);width:92px;flex-shrink:0;text-align:center}

/* Alerts */
.alert-section{margin-bottom:18px}
.alert-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.alert-card.warning{border-left:3px solid var(--yellow)}
.alert-card.danger{border-left:3px solid var(--red)}
.alert-card.info{border-left:3px solid var(--vc1)}
.alert-card.vacation{border-left:3px solid var(--orange)}
.alert-card.mission{border-left:3px solid var(--vc2)}
.alert-icon{width:22px;text-align:center;font-weight:900}
.no-data{color:var(--text2);font-style:italic;padding:18px;text-align:center}

/* ===== DASHBOARD ===== */
.dash-layout{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto;gap:16px}
@media(max-width:1200px){.dash-layout{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.dash-layout{grid-template-columns:1fr}}
.dash-panel{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:10px;padding:18px;overflow:visible;position:relative}
.dash-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.dash-panel.p-vc1::before{background:linear-gradient(90deg,var(--vc1),transparent)}
.dash-panel.p-vc2::before{background:linear-gradient(90deg,var(--vc2),transparent)}
.dash-panel.p-red::before{background:linear-gradient(90deg,var(--red),transparent)}
.dash-panel.p-hours::before{background:linear-gradient(90deg,var(--vc1),var(--vc2))}
.dash-panel.p-miss::before{background:linear-gradient(90deg,#ddcc55,var(--orange))}
.dash-panel.p-intl::before{background:linear-gradient(90deg,#8ea3ff,#c488ff)}
.panel-title{font-size:.82rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.panel-title .icon{font-size:1.1rem}
.panel-title .count{margin-left:auto;background:var(--bg);padding:2px 8px;border-radius:10px;font-size:.72rem;color:var(--text)}

/* Top pilots */
.top-pilot{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.top-pilot:last-child{border:none}
.top-rank{font-size:1.6rem;width:36px;text-align:center;line-height:1}
.top-info{flex:1;min-width:0}
.top-tri{font-weight:900;font-size:1.15rem;letter-spacing:1px}
.top-name{font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-stat{text-align:right}
.top-hours{font-size:1.1rem;font-weight:800}
.top-bar{width:100%;height:4px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.top-bar-fill{height:100%;border-radius:2px;transition:width .6s}

/* Desadaptados */
.desadapt-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.desadapt-item:last-child{border:none}
.desadapt-tri{font-weight:900;font-size:1.05rem;width:50px}
.desadapt-badge{padding:3px 8px;border-radius:4px;font-size:.72rem;font-weight:900}
.badge-danger{background:rgba(255,68,68,.15);color:var(--red);border:1px solid rgba(255,68,68,.3)}
.badge-warning{background:rgba(255,136,0,.15);color:var(--orange);border:1px solid rgba(255,136,0,.3)}

/* Hours progress */
.prog-section{margin-bottom:16px}
.prog-label{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:6px}
.prog-track{height:32px;background:var(--bg);border:1px solid var(--border);border-radius:6px;position:relative;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .6s;position:relative}
.prog-fill::after{content:attr(data-pct);position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:.72rem;font-weight:900;color:var(--bg)}
.prog-marker{position:absolute;top:-4px;bottom:-4px;width:3px;background:#fff;border-radius:2px;opacity:.9;z-index:2;box-shadow:0 0 6px rgba(255,255,255,.6)}

/* Missions */
.mission-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:.2s}
.mission-card:hover{border-color:rgba(255,255,255,.15)}
.mission-anv{font-weight:900;font-size:.9rem;padding:4px 8px;border-radius:4px;text-align:center;min-width:50px}
.mission-anv.vc1{background:rgba(0,212,255,.12);color:var(--vc1);border:1px solid rgba(0,212,255,.25)}
.mission-anv.vc2{background:rgba(0,255,136,.12);color:var(--vc2);border:1px solid rgba(0,255,136,.25)}
.mission-body{flex:1;min-width:0}
.mission-title{font-weight:700;font-size:.88rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-sub{font-size:.72rem;color:var(--text2)}
.mission-date{text-align:right;min-width:110px;flex-shrink:0}
.mission-date-main{font-size:.82rem;font-weight:700}
.mission-date-range{font-size:.68rem;color:var(--text2)}
.mission-tipo.pern{background:rgba(100,100,200,.12);color:#8888cc;border-color:rgba(100,100,200,.25)}
.mission-tipo{padding:3px 8px;border-radius:4px;font-size:.7rem;font-weight:900;display:inline-flex;align-items:center;justify-content:center;background:rgba(221,204,85,.12);color:#ddcc55;border:1px solid rgba(221,204,85,.25);min-width:60px;text-align:center;flex-shrink:0;white-space:nowrap;line-height:1}
.mission-ongoing{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.full-missions{grid-column:1/-1}

footer{background:var(--bg2);border-top:1px solid var(--border);padding:6px 20px;font-size:.72rem;color:var(--text2);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px}
footer a{color:var(--vc1);cursor:pointer;text-decoration:none;white-space:nowrap}
footer a:hover{text-decoration:underline}
.error-overlay{position:fixed;inset:0;background:rgba(10,15,26,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;padding:20px;text-align:center}
.error-overlay h2{color:var(--red)}
.error-overlay button{padding:10px 24px;background:var(--vc1);color:var(--bg);border:none;cursor:pointer;font-family:inherit;font-size:1rem;border-radius:4px}
.loading{color:var(--text2);text-align:center;padding:40px;font-size:1rem}

@media(max-width:768px){
  .desktop-only{display:none!important}
  header{flex-wrap:wrap;padding:6px 10px;gap:6px}
  header>div:first-child{display:flex!important;flex-wrap:wrap!important;align-items:center!important;gap:6px!important;max-width:100%!important;width:100%!important}
  header>div:first-child>div:first-child{width:36px!important;height:36px!important;flex-shrink:0!important}
  header>div:first-child>div:first-child svg,header>div:first-child>div:first-child img{width:40px!important;height:40px!important}
  header>div:first-child>div:nth-child(2){flex-shrink:1!important;min-width:0!important;flex-direction:column!important;align-items:flex-start!important;gap:0!important}
  header>div:first-child>div:nth-child(2)>div:first-child{font-size:1rem!important}
  header>div:first-child>div:nth-child(2)>div:last-child{font-size:.22rem!important;white-space:nowrap!important;letter-spacing:0!important}
  #kpi-box{display:flex!important;width:100%!important;flex:0 0 100%!important;justify-content:center!important;margin-top:4px!important}
  .header-right{width:100%!important;display:flex!important;justify-content:center!important;gap:6px!important;order:5;padding-top:2px}
  .header-right .clock{display:none!important}
  #kpi-box{gap:12px!important;margin-left:0!important;width:100%}
  #kpi-box>div>div:first-child{font-size:1.1rem!important}
  .ctrl-btn{display:none}
  .nav-btns{width:100%;justify-content:center;flex-wrap:wrap;gap:4px;display:none;background:var(--bg2);padding:8px;border-radius:8px;border:1px solid var(--border)}
  .nav-btns.open{display:flex}
  .nav-btns button{padding:8px 12px;font-size:.78rem;width:calc(50% - 4px)}
  .hamburger-btn{display:block!important;background:var(--bg3);color:var(--vc1);border:1px solid var(--vc1);padding:8px 16px;cursor:pointer;font-family:inherit;font-size:.9rem;border-radius:6px;width:100%;text-align:center;order:10;margin-top:4px;font-weight:700}
  header>div:first-child{flex-wrap:wrap;gap:8px}
  header>div:first-child>div:first-child{width:36px;height:36px}
  header>div:first-child>div:first-child svg{width:24px;height:24px}
  header>div:first-child>div:nth-child(2) div:last-child{font-size:1rem!important}
  
  main{overflow:auto}
  .screen{padding:6px;overflow-x:hidden;overflow-y:auto;max-width:100vw}
  .screen *{box-sizing:border-box}
  header{max-width:100vw;overflow:visible}
  
  .dash-layout{grid-template-columns:1fr!important;gap:12px;max-width:100%;overflow:hidden}
  .dash-panel{padding:8px;min-width:0;max-width:100%;overflow:hidden;word-break:break-word}
  .dash-panel[style*="grid-column"]{grid-column:1!important}
  .panel-title{font-size:.75rem}
  
  .top-pilot{padding:8px 0}
  .top-rank{font-size:1.3rem;width:30px}
  .top-tri{font-size:1rem!important}
  .top-hours{font-size:.95rem!important}
  
  .mission-card{padding:10px;gap:8px;flex-wrap:wrap;align-items:center}
  .mission-anv{font-size:.7rem;padding:3px 6px;flex-shrink:0}
  .mission-body{flex:1;min-width:60%}
  .mission-title{font-size:.78rem}
  .mission-tipo{font-size:.62rem!important;padding:2px 6px!important;flex-shrink:0;align-self:center}
  .mission-date{min-width:auto!important;text-align:right;flex-shrink:0}
  .mission-date-main{font-size:.7rem;display:inline}
  .mission-date-range{font-size:.62rem;display:inline;margin-left:4px;color:var(--text2)}
  
  .prog-section{margin-bottom:12px}
  .prog-label{font-size:.75rem}
  .prog-track{height:26px}
  
  .pilot-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .pilot-card{padding:10px}
  .pilot-card .trigrama{font-size:1.2rem}
  
  .hours-cols{grid-template-columns:1fr!important}
  .bar-row{font-size:.78rem;flex-wrap:wrap;gap:4px}
  .bar-label{width:44px;font-size:.8rem}
  .bar-name{width:80px;font-size:.65rem}
  .bar-pct{width:40px;font-size:.72rem}
  .bar-hours{width:80px;font-size:.62rem;text-align:right}
  
  .checklist-grid{grid-template-columns:1fr;gap:10px}
  .check-item{padding:10px 12px;gap:8px}
  .check-summary{gap:10px}
  .check-summary .stat{padding:10px 14px}
  .check-summary .stat-num{font-size:1.4rem}
  
  .acnt-grid{gap:12px}
  .acnt-card{min-width:280px;max-width:100%;padding:14px}
  
  .alert-card{padding:8px 10px;gap:8px;font-size:.82rem}
  
  h2{font-size:1.1rem;margin-bottom:10px}
  footer{padding:4px 10px;font-size:.65rem;flex-wrap:wrap;justify-content:center;gap:4px}
}

/* ACNT/ALTR cards */
.acnt-grid{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px}
.acnt-card{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border);border-radius:10px;padding:18px;min-width:320px;max-width:380px;flex-shrink:0;position:relative;overflow:hidden}
.acnt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.acnt-card.pct-high::before{background:linear-gradient(90deg,var(--green),transparent)}
.acnt-card.pct-mid::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.acnt-card.pct-low::before{background:linear-gradient(90deg,var(--red),transparent)}
.acnt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.acnt-header .date{font-size:.82rem;color:var(--text2)}
.acnt-header .anv{font-weight:900;font-size:1rem;padding:3px 10px;border-radius:4px;background:rgba(0,255,136,.12);color:var(--vc2);border:1px solid rgba(0,255,136,.25)}
.acnt-progress{margin-bottom:14px}
.acnt-progress .prog-track{height:24px}
.acnt-items{list-style:none;max-height:400px;overflow-y:auto}
.acnt-items li{padding:4px 0;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:8px}
.acnt-items li:last-child{border:none}
.acnt-items li .icon{width:18px;text-align:center;flex-shrink:0}

/* Diário Checklist */
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.checklist-grid{grid-template-columns:1fr}}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;transition:.2s}
.check-item.done{border-left:3px solid var(--green)}
.check-item.pending{border-left:3px solid var(--text2);opacity:.7}
.check-icon{font-size:1.2rem;width:28px;text-align:center;flex-shrink:0}
.check-task{flex:1;font-size:.88rem}
.check-resp{font-size:.78rem;font-weight:900;padding:3px 8px;border-radius:4px;min-width:42px;text-align:center}
.check-resp.filled{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.25)}
.check-resp.empty{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border)}
.check-summary{display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.check-summary .stat{text-align:center;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.check-summary .stat-num{font-size:1.8rem;font-weight:900}
.check-summary .stat-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:12px}
.cal-header{text-align:center;font-size:.68rem;color:var(--text2);padding:6px 0;font-weight:900;text-transform:uppercase}
.cal-day{min-height:80px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:.7rem;position:relative}
.cal-day.today{border:2px solid var(--vc1);background:rgba(0,255,255,.05)}
.cal-day.other-month{opacity:.3}

<script>
const SHEET='1gwkeV2iA_JPTZ3rp0wf1PvXUI0TiOzNg3Xd4DhWwpao';
const PLAN_SHEET='1EV81x0Np-zeHhznvzAGrPyck5YUHgW_eRb18uOGc7nQ';
const ESCALA_SHEET='1MxhMnlzZNdXUkFRs_XmBI8SI3xhL1TDLEiCZ7aJKE-g';
const GIDS={disp:2129805598,lanc:489572946,previsao:1534384160,acnt:519681315};
const csvUrl=gid=>`https://docs.google.com/spreadsheets/d/${SHEET}/export?format=csv&gid=${gid}`;
const planCsvUrl=()=>`https://docs.google.com/spreadsheets/d/${PLAN_SHEET}/export?format=csv`;

let currentScreen=0;
let pilotData={vc1:[],vc2:[]}, flights=[], feriasData=[], missionsData=[], diarioData=[], acntData=[], checklistData=[], metarRaw='', metarDecoded={};
let cartoesData=[];let cartoesFailed=false;let pauDeSeboData={};
let metarMulti={};
let anualVC1={voadas:0,esforco:650}, anualVC2={voadas:0,esforco:1220};
let escalaData={vc1:{consulta:'',raio:[]},vc2:{consulta:'',raio:[]}};
let confirmaData=[];
let omData=[];

function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')inQ=false;else field+=c;}
    else{if(c==='"')inQ=true;else if(c===','){row.push(field.trim());field='';}
    else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;row.push(field.trim());if(row.some(x=>x!==''))rows.push(row);row=[];field='';}else field+=c;}
  }
  row.push(field.trim());if(row.some(x=>x!==''))rows.push(row);return rows;
}

function parseBrNum(s){if(!s||s==='#N/A'||s==='#DIV/0!'||s==='#VALUE!')return null;return parseFloat(String(s).replace(/\s/g,'').replace('%','').replace(',','.'));}
function parseHours(s){if(!s||s==='#N/A'||s==='#DIV/0!'||s==='#VALUE!')return null;const str=String(s).trim();const m=str.match(/(\d+):(\d+)/);if(m)return parseInt(m[1],10)+parseInt(m[2],10)/60;return parseBrNum(str);}
function parseDateBR(s){if(!s||s==='#N/A'||s==='#DIV/0!'||s==='#VALUE!')return null;const str=String(s).trim();const m=str.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(!m)return null;return new Date(parseInt(m[3],10),parseInt(m[2],10)-1,parseInt(m[1],10));}
function nowBRT(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}));}
function fmtDate(d){if(!d)return'';return d.toLocaleDateString('pt-BR',{timeZone:'America/Sao_Paulo'});}
function fmtDateShort(d){if(!d)return'';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',timeZone:'America/Sao_Paulo'}).replace('.','');}
function fmtHours(h){if(h==null)return'—';const hh=Math.floor(h);const mm=Math.round((h-hh)*60);return `${hh}h${mm.toString().padStart(2,'0')}`;}
function fetchWithTimeout(url,ms=15000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{cache:'no-store',signal:c.signal}).finally(()=>clearTimeout(t));}
async function fetchCSV(gid){const r=await fetchWithTimeout(csvUrl(gid));if(!r.ok)throw new Error('fetch failed');return parseCSV(await r.text());}
function parseHHMM(s){const m=String(s||'').match(/^(\d+):(\d+)/);return m?(parseInt(m[1])+parseInt(m[2])/60):0;}
async function fetchAnual(){
  try{
    const [vc1Rows,vc2Rows]=await Promise.all([fetchCSVByName('Anual machado'),fetchCSVByName('Anual VC2')]);
    const parseSheet=(rows)=>{
      let voadas=0,esforco=0;
      for(const row of rows){
        const label=String(row[6]||'').trim().toLowerCase();
        const val=String(row[7]||'').trim();
        if(label==='voadas')voadas=parseHHMM(val);
        if(label.includes('esfor'))esforco=parseHHMM(val);
      }
      return {voadas,esforco};
    };
    anualVC1=parseSheet(vc1Rows);if(!anualVC1.esforco)anualVC1.esforco=650;
    anualVC2=parseSheet(vc2Rows);if(!anualVC2.esforco)anualVC2.esforco=1220;
  }catch(e){console.warn('fetchAnual error',e);}
}
async function fetchCSVByName(sheetName){const url=`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;const r=await fetchWithTimeout(url);if(!r.ok)throw new Error('fetch failed');return parseCSV(await r.text());}

async function fetchPauDeSebo(){
  try{
    const rows=await fetchCSVByName('pau de sebo');
    pauDeSeboData={};
    for(const row of rows){
      const tri=String(row[2]||'').trim().toUpperCase();
      if(!tri||tri.length!==3||!/^[A-Z]{3}$/.test(tri))continue;
      const horas=parseHHMM(row[4]);
      const afst=String(row[5]||'').trim();
      pauDeSeboData[tri]={horas,afst};
    }
    console.log('Pau de sebo:',Object.keys(pauDeSeboData).length,'pilotos');
  }catch(e){console.warn('fetchPauDeSebo falhou, usando fallback',e);}
}
function calcAfastamentos(){
  // Fonte primária: pau de sebo. Fallback: flights[]
  const td=nowBRT();
  td.setHours(0,0,0,0);
  const allP=[...pilotData.vc1,...pilotData.vc2];
  for(const p of allP){
    const pds=pauDeSeboData[p.trigrama];
    const triRe=new RegExp('\\b'+p.trigrama+'\\b','i');
    const pilotFlights=flights.filter(f=>f.piloto&&triRe.test(f.piloto)&&f.dataObj&&f.dataObj<=td);
    // Horas voadas: pau de sebo (primário) → lançamentos (fallback)
    if(pds&&pds.horas>0){
      p.voadas=pds.horas;
    }else if(p.voadas==null||p.voadas===0){
      const totalH=pilotFlights.reduce((s,f)=>s+parseHHMM(f.tempo),0);
      if(totalH>0)p.voadas=totalH;
    }
    // Afastamento: pau de sebo (primário) → flights (fallback)
    if(pds&&pds.afst!==''){
      p.afastamento=pds.afst;
    }else if(pilotFlights.length){
      const lastFlight=pilotFlights.reduce((a,b)=>a.dataObj>b.dataObj?a:b);
      p.afastamento=String(Math.round((td-lastFlight.dataObj)/86400000));
    }else{
      if(!p.afastamento||p.afastamento==='#N/A')p.afastamento='999';
    }
  }
  console.log('Afastamentos calculados para',allP.length,'pilotos (pau de sebo:',Object.keys(pauDeSeboData).length,')');
}

function parseDisponibilidade(rows){
  function norm(x){return String(x||'').trim().toUpperCase();}
  let hdr=null,hdrRowIdx=-1;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let i=0;i<row.length-4;i++){
      if(norm(row[i])==='GRUPO'&&norm(row[i+1])==='QT'&&norm(row[i+2])==='TRIGRAMA'&&norm(row[i+3])==='PILOTO'){
        const base=i;const slice=row.slice(base,base+40).map(norm);
        const rel=(label)=>{const j=slice.indexOf(label);return j>=0?base+j:null;};
        hdr={GRUPO:base,QT:base+1,TRIGRAMA:base+2,PILOTO:base+3,
          OPR:rel('OPR'),META:rel('META'),VOADAS:rel('VOADAS'),
          PCT:(rel('% ANO')!=null?rel('% ANO'):rel('%')),
          INSP:rel('INSP SAU'),CVI:rel('CVI'),AFAST:rel('AFASTAMENTO')};
        if(hdr.OPR!=null&&hdr.META!=null&&hdr.VOADAS!=null){hdrRowIdx=r;break;}else hdr=null;
      }
    }
    if(hdr)break;
  }
  if(!hdr)return{vc1:[],vc2:[]};
  const vc1=[],vc2=[];
  for(let r=hdrRowIdx+1;r<rows.length;r++){
    const row=rows[r];
    const tri=String(row[hdr.TRIGRAMA]||'').trim().toUpperCase();
    if(!tri||tri==='TRIGRAMA')continue;
    const qt=String(row[hdr.QT]||'').trim().toUpperCase();
    if(qt!=='VC1'&&qt!=='VC2')continue;
    const pilot={trigrama:tri,name:String(row[hdr.PILOTO]||'').trim(),
      opr:hdr.OPR!=null?String(row[hdr.OPR]||'').trim():'',
      grupo:hdr.GRUPO!=null?String(row[hdr.GRUPO]||'').trim().toUpperCase():'',
      meta:hdr.META!=null?parseHours(row[hdr.META]):null,
      voadas:hdr.VOADAS!=null?parseHours(row[hdr.VOADAS]):null,
      pct:hdr.PCT!=null?parseBrNum(row[hdr.PCT]):null,
      inspSau:hdr.INSP!=null?String(row[hdr.INSP]||'').trim():'',
      inspSauDate:hdr.INSP!=null?parseDateBR(row[hdr.INSP]):null,
      cvi:hdr.CVI!=null?String(row[hdr.CVI]||'').trim():'',
      cviDate:hdr.CVI!=null?parseDateBR(row[hdr.CVI]):null,
      afastamento:hdr.AFAST!=null?String(row[hdr.AFAST]||'').trim():'',
      anv:qt==='VC1'?'VC-1':'VC-2'};
    (qt==='VC1'?vc1:vc2).push(pilot);
  }
  vc1.sort((a,b)=>a.trigrama.localeCompare(b.trigrama));
  vc2.sort((a,b)=>a.trigrama.localeCompare(b.trigrama));
  return{vc1,vc2};
}

function parseLancamentos(rows){
  const fl=[];
  for(const row of rows){
    const anv=row[1]||'';if(anv!=='VC1'&&anv!=='VC2')continue;
    const data=row[3]||'';if(!String(data).match(/\d{2}\/\d{2}\/\d{4}/))continue;
    fl.push({anv:anv==='VC1'?'VC-1':'VC-2',om:(row[2]||'').trim(),
      data:String(data).trim(),dataObj:parseDateBR(data),
      piloto:(row[4]||'').trim(),missao:(row[5]||'').trim(),
      tempo:(row[6]||'').trim(),obs:(row[7]||'').trim()});
  }
  fl.sort((a,b)=>(b.dataObj?.getTime()||0)-(a.dataObj?.getTime()||0));return fl;
}

function parseFerias(rows){
  let hdrRow=null,hdr=null;
  for(const row of rows){
    const idx={};const up=row.map(x=>String(x||'').trim().toUpperCase());
    for(const lab of['ANV','PILOTO','TRIGRAMA','INÍCIO','INICIO','FIM','PERÍODO','PERIODO']){
      const i=up.findIndex(c=>c===lab);if(i>=0)idx[lab]=i;}
    const hasDates=(idx['INÍCIO']!=null||idx['INICIO']!=null)&&idx['FIM']!=null;
    const hasPilot=idx['TRIGRAMA']!=null||idx['PILOTO']!=null;
    if(hasDates&&hasPilot){hdrRow=row;hdr=idx;break;}
  }
  if(!hdr)return[];
  const inicioIdx=hdr['INÍCIO']!=null?hdr['INÍCIO']:hdr['INICIO'];
  const fimIdx=hdr['FIM'];const triIdx=hdr['TRIGRAMA']!=null?hdr['TRIGRAMA']:hdr['PILOTO'];
  const anvIdx=hdr['ANV'];const list=[];let started=false;
  for(const row of rows){
    if(row===hdrRow){started=true;continue;}if(!started)continue;
    const tri=(row[triIdx]||'').trim();const ini=parseDateBR(row[inicioIdx]);const fim=parseDateBR(row[fimIdx]);
    if(!tri||!ini||!fim)continue;
    const anv=anvIdx!=null?String(row[anvIdx]||'').trim():'';
    list.push({trigrama:tri.toUpperCase(),anv,inicio:ini,fim:fim});
  }
  return list;
}

function parsePrevisaoMissoes(rows){
  const missions=[];
  for(const row of rows){
    const anv=String(row[1]||'').trim().toUpperCase();
    if(anv!=='VC1'&&anv!=='VC2')continue;
    const tipo=String(row[2]||'').trim();const pais=String(row[3]||'').trim();
    const motivo=String(row[4]||'').trim();const inicioRaw=String(row[5]||'').trim();
    const fimRaw=String(row[6]||'').trim();const link=String(row[7]||'').trim();
    let inicio=parseDateBR(inicioRaw),fim=parseDateBR(fimRaw);
    if(!inicio&&inicioRaw.match(/^\d{1,2}\/\d{1,2}$/)){const[d,m]=inicioRaw.split('/');inicio=new Date(nowBRT().getFullYear(),parseInt(m,10)-1,parseInt(d,10));}
    if(!fim&&fimRaw.match(/^\d{1,2}\/\d{1,2}$/)){const[d,m]=fimRaw.split('/');fim=new Date(nowBRT().getFullYear(),parseInt(m,10)-1,parseInt(d,10));}
    if(!inicio){const m2=inicioRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{2})$/);if(m2)inicio=new Date(2000+parseInt(m2[3],10),parseInt(m2[2],10)-1,parseInt(m2[1],10));}
    if(!fim){const m2=fimRaw.match(/(\d{1,2})\/(\d{1,2})\/(\d{2})$/);if(m2)fim=new Date(2000+parseInt(m2[3],10),parseInt(m2[2],10)-1,parseInt(m2[1],10));}
    missions.push({anv:anv==='VC1'?'VC-1':'VC-2',tipo,pais,motivo,inicioRaw,fimRaw,inicio,fim,link,
      label:motivo?`${pais} — ${motivo}`:pais});
  }
  return missions;
}

function parseDiario(rows){
  // Row 0: dates at certain columns. Row 1: aeronave. Rows 4,5,6: main flight legs. Row ~20: extra flights
  // Find date columns in row 0
  if(!rows.length)return[];
  const r0=rows[0];const r1=rows[1]||[];
  const dateColMap=[];// [{colIdx, date, aeronave}]
  for(let c=0;c<r0.length;c++){
    const v=String(r0[c]||'').trim();
    // Match dates like "qua., 25 de fev. " or ISO-like dates
    const mBR=v.match(/(\d{1,2})\s+de\s+(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)/i);
    const mISO=v.match(/^(\d{4})-(\d{2})-(\d{2})/);
    let dt=null;
    if(mBR){
      const months={jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};
      const day=parseInt(mBR[1],10);const mon=months[mBR[2].toLowerCase()];
      if(mon!=null)dt=new Date(nowBRT().getFullYear(),mon,day);
    }else if(mISO){
      dt=new Date(parseInt(mISO[1]),parseInt(mISO[2])-1,parseInt(mISO[3]));
    }
    if(dt){
      const anv=String(r1[c]||'').trim();
      dateColMap.push({col:c,date:dt,aeronave:anv});
    }
  }
  // Flight rows: rows index 4,5,6 (main legs) and look for extra flights around row 20
  const flightRowIdxs=[4,5,6];
  // Find extra flight rows (look for rows where col 1 has task name and has route-like data)
  for(let ri=15;ri<Math.min(rows.length,30);ri++){
    const rr=rows[ri];if(!rr)continue;
    // Check if any date column has route-like data (contains hyphen, looks like ICAO codes)
    let hasFlightData=false;
    for(const dc of dateColMap.slice(0,5)){
      const dep=String(rr[dc.col]||'').trim();
      const route=String(rr[dc.col+1]||'').trim();
      if(dep&&route&&route.includes('-')&&!route.includes('Status')&&!route.includes('Origem')&&!route.includes('Marco')&&
         !dep.includes('Lastro')&&!dep.includes('Nº')&&!dep.includes('DEP\n')&&!dep.includes('MP')&&!dep.includes('Status')){
        hasFlightData=true;break;
      }
    }
    if(hasFlightData)flightRowIdxs.push(ri);
  }
  // Extract flights per date
  const result=[];// {date, dateStr, aeronave, legs:[{dep,route,fuel,pilots:[],mission,isExtra}]}
  for(const dc of dateColMap){
    const legs=[];
    for(const ri of flightRowIdxs){
      const rr=rows[ri];if(!rr)continue;
      const dep=String(rr[dc.col]||'').trim();
      const route=String(rr[dc.col+1]||'').trim();
      if(!dep||!route||!route.includes('-'))continue;
      if(dep.includes('Lastro')||dep.includes('Nº')||dep.includes('Status')||dep.includes('DEP'))continue;
      if(route.includes('Status')||route.includes('Origem')||route.includes('Marco'))continue;
      const fuel=String(rr[dc.col+2]||'').trim();
      const p1=String(rr[dc.col+3]||'').trim();
      const p2=String(rr[dc.col+4]||'').trim();
      const p3=String(rr[dc.col+5]||'').trim();
      const mission=String(rr[dc.col+6]||'').trim();
      const pilots=[p1,p2,p3].filter(Boolean);
      legs.push({dep,route,fuel,pilots,mission,isExtra:ri>10});
    }
    if(legs.length||dc.aeronave!=='AERONAVE'){
      const ds=dc.date;
      const dayNames=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
      result.push({date:dc.date,dateStr:`${String(ds.getDate()).padStart(2,'0')}/${String(ds.getMonth()+1).padStart(2,'0')}`,
        dayName:dayNames[ds.getDay()],aeronave:dc.aeronave,legs});
    }
  }
  return result;
}

// ===== METAR =====
const wxCodes={MI:'raso',PR:'parcial',BC:'bancos',DR:'baixa deriva',BL:'soprado',SH:'pancadas',TS:'trovoada',FZ:'congelante',
  DZ:'chuvisco',RA:'chuva',SN:'neve',SG:'grãos de neve',IC:'cristais de gelo',PL:'pelotas de gelo',GR:'granizo',GS:'granizo pequeno',
  UP:'precipitação desconhecida',BR:'névoa úmida',FG:'nevoeiro',FU:'fumaça',VA:'cinza vulcânica',DU:'poeira',SA:'areia',HZ:'névoa seca',
  PO:'redemoinho',SQ:'tempestade',FC:'tornado',SS:'tempestade de areia',DS:'tempestade de poeira'};
const cloudCodes={FEW:'poucas (1-2/8)',SCT:'esparsas (3-4/8)',BKN:'nublado (5-7/8)',OVC:'encoberto (8/8)'};

function decodeMetar(raw){
  if(!raw)return{};
  const parts=raw.trim().split(/\s+/);
  const d={raw,station:'',time:'',wind:'',vis:'',wx:[],clouds:[],temp:'',dewpoint:'',qnh:'',remarks:''};
  let i=0;
  // METAR prefix
  if(parts[i]==='METAR'||parts[i]==='SPECI')i++;
  // Station
  d.station=parts[i++]||'';
  // Time
  const tm=parts[i]||'';
  if(tm.match(/^\d{6}Z$/)){
    const day=tm.substring(0,2),hr=tm.substring(2,4),mn=tm.substring(4,6);
    d.time=`Dia ${day}, ${hr}:${mn} UTC`;i++;
  }
  // Wind (may have variable)
  while(i<parts.length){
    const p=parts[i];
    // Wind
    if(p.match(/^\d{3}\d{2,3}(G\d{2,3})?KT$/)){
      const dir=p.substring(0,3);const spd=p.match(/(\d{3})(\d{2,3})(G(\d{2,3}))?KT/);
      if(spd){
        const dirTxt=dir==='000'?'calmo':dir+'°';
        let wTxt=`${dirTxt} / ${parseInt(spd[2])}kt`;
        if(spd[4])wTxt+=` rajadas ${parseInt(spd[4])}kt`;
        d.wind=wTxt;
      }
      i++;continue;
    }
    if(p.match(/^VRB\d{2,3}KT$/)){d.wind=`Variável / ${parseInt(p.substring(3))}kt`;i++;continue;}
    if(p.match(/^\d{3}V\d{3}$/)){d.wind+=' (variando '+p.replace('V','-')+')';i++;continue;}
    // Visibility
    if(p.match(/^\d{4}$/)&&!p.match(/^\d{6}Z$/)){
      const v=parseInt(p);d.vis=v>=9999?'10km+':v+'m';i++;continue;
    }
    if(p==='CAVOK'){d.vis='CAVOK (céu claro, vis >10km)';d.clouds.push('Céu claro');i++;continue;}
    // Weather
    const wxMatch=p.match(/^([+-]?)(VC)?(MI|PR|BC|DR|BL|SH|TS|FZ)?(DZ|RA|SN|SG|IC|PL|GR|GS|UP|BR|FG|FU|VA|DU|SA|HZ|PO|SQ|FC|SS|DS){1,3}$/);
    if(wxMatch){
      const intensity=p[0]==='+' ?'forte ':p[0]==='-'?'fraco ':'';
      const stripped=p.replace(/^[+-]/,'').replace(/^VC/,'');
      let desc=intensity;
      for(let c=0;c<stripped.length;c+=2){const code=stripped.substring(c,c+2);desc+=(wxCodes[code]||code)+' ';}
      d.wx.push(desc.trim());i++;continue;
    }
    // Clouds
    const clMatch=p.match(/^(FEW|SCT|BKN|OVC)(\d{3})(CB|TCU)?$/);
    if(clMatch){
      const alt=parseInt(clMatch[2])*100;
      let cTxt=`${cloudCodes[clMatch[1]]||clMatch[1]} a ${alt.toLocaleString()}ft`;
      if(clMatch[3]==='CB')cTxt+=' ⛈ Cumulonimbus';
      if(clMatch[3]==='TCU')cTxt+=' 🌩 Cumulus congestus';
      d.clouds.push(cTxt);i++;continue;
    }
    if(p==='NSC'||p==='NCD'||p==='SKC'||p==='CLR'){d.clouds.push('Céu claro');i++;continue;}
    // Temp/Dewpoint
    const tMatch=p.match(/^(M?\d{2})\/(M?\d{2})$/);
    if(tMatch){
      const t=tMatch[1].replace('M','-'),dp=tMatch[2].replace('M','-');
      d.temp=t+'°C';d.dewpoint=dp+'°C';i++;continue;
    }
    // QNH
    if(p.match(/^Q\d{4}$/)){d.qnh=parseInt(p.substring(1))+' hPa';i++;continue;}
    if(p.match(/^A\d{4}$/)){d.qnh=(parseInt(p.substring(1))/100).toFixed(2)+' inHg';i++;continue;}
    // RMK
    if(p==='RMK'){d.remarks=parts.slice(i+1).join(' ');break;}
    i++;
  }
  return d;
}

const CORS_PROXIES=[
  u=>'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://corsproxy.io/?'+encodeURIComponent(u)
];
async function proxyFetch(url){
  for(const mk of CORS_PROXIES){
    try{const r=await fetchWithTimeout(mk(url),10000);if(r.ok){const t=(await r.text()).trim();if(t&&(t.startsWith('METAR')||t.startsWith('SPECI')||t.match(/^SB\w{2}\s/)))return t;}}catch(e){}
  }
  return '';
}
async function proxyFetchRaw(url){
  for(const mk of CORS_PROXIES){
    try{const r=await fetchWithTimeout(mk(url),10000);if(r.ok){const t=(await r.text()).trim();if(t)return t;}}catch(e){}
  }
  return '';
}
async function fetchMetar(){
  try{
    const text=await proxyFetch('https://aviationweather.gov/api/data/metar?ids=SBBR&format=raw');
    if(!text)throw new Error('Sem dados');
    metarRaw=text;metarDecoded=decodeMetar(metarRaw);
  }catch(e){console.error('METAR fetch error',e);throw e;}
}
async function fetchMetarMulti(){
  try{
    const ids='SBBR,SBCF,SBRJ,SBSP';
    const text=await proxyFetch('https://aviationweather.gov/api/data/metar?ids='+ids+'&format=raw');
    if(!text)throw new Error('Sem dados multi');
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    for(const line of lines){
      const m=line.match(/^(?:(?:METAR|SPECI)\s+)?(SB\w{2})\s/);
      if(m)metarMulti[m[1]]=line;
    }
  }catch(e){console.warn('fetchMetarMulti error',e);}
}

function isOnVacation(trigrama,date){const t=String(trigrama||'').toUpperCase();return feriasData.some(f=>f.trigrama===t&&f.inicio<=date&&date<=f.fim);}

function getPilotStatus(p,td){
  if(feriasData.length&&isOnVacation(p.trigrama,td))return{status:'FERIAS',cls:'st-ferias'};
  const EXCLUIDOS=['BEH','SOZ'];
  if(String(p.grupo).toUpperCase()==='OUT'||EXCLUIDOS.includes(p.trigrama))return{status:'FORA',cls:'st-out'};
  // EXT: continua avaliação normal (férias, CVI, etc). Se tudo ok → DISPONÍVEL
  const afRaw=String(p.afastamento||'').replace(/[^0-9\-]/g,'');
  const afNum=parseInt(afRaw,10);
  const afAbs=!isNaN(afNum)?Math.abs(afNum):NaN;
  if(!isNaN(afAbs)&&afAbs>=35)return{status:'DESADAPTADO',cls:'st-afastado'};
  if(!isNaN(afAbs)&&afAbs>=20&&afAbs<35)return{status:'DISPONÍVEL',cls:'st-apto',alerta:'DESADAPTADO PR'};
  // Acumular TODOS os motivos de indisponibilidade
  const motivos=[];
  if(p.cviDate&&p.cviDate<td)motivos.push('CVI');
  if(p.inspSauDate&&p.inspSauDate<td)motivos.push('INSP');
  // Cruzar com aba cartões
  if(typeof cartoesData!=='undefined'&&cartoesData.length){
    const ct=cartoesData.find(c=>c.trigrama===p.trigrama);
    if(ct){
      const isPiloto=(ct.funcao||'').toLowerCase().includes('piloto');
      const criticos=[{k:'inspSaude',nome:'INSP SAÚDE'},{k:'cviRvsm',nome:'CVI/RVSM',pilotoOnly:true},{k:'crm',nome:'CRM'}];
      criticos.forEach(c=>{
        if(c.pilotoOnly&&!isPiloto)return;
        const v=ct[c.k];
        if(v&&v.date&&v.date<td&&!motivos.includes(c.nome))motivos.push(c.nome);
      });
    }
  }
  if(motivos.length)return{status:`INDISPONÍVEL (${motivos.join(', ')})`,cls:'st-inapto'};
  if(cartoesFailed)return{status:'DISPONÍVEL',cls:'st-apto',alerta:'DADOS INCOMPLETOS'};
  return{status:'DISPONÍVEL',cls:'st-apto'};
}

        <div style="min-width:55px;text-align:center;font-weight:900;font-size:.95rem;color:${anvColor}">${c.anv}</div>
        <div class="mission-body"><div class="mission-title">SAVISO ${c.dia} — Missão ${c.letra}</div><div class="mission-sub">${c.escalados.join(' / ')}</div></div>
        </div>`;
    }
    html+='<div style="font-size:.72rem;color:var(--green);margin-top:6px">✅ Escala confirmada (SAVISO)</div>';
  }else if(todayData&&todayData.legs.length){
    for(const leg of todayData.legs){
      const routeParts=leg.route.replace(/-/g,' → ');
      const anvTxt=todayData.aeronave&&todayData.aeronave!=='AERONAVE'?todayData.aeronave:'';
      const anvDisplay=leg.isExtra?'FAB 2590':anvTxt;
      html+=`<div class="mission-card">
        <div style="min-width:55px;text-align:center;font-weight:900;font-size:.95rem;color:var(--vc1)">${leg.dep}</div>
        <div class="mission-body"><div class="mission-title">${routeParts}</div><div class="mission-sub">${anvDisplay?'<span style="color:var(--vc1);font-weight:700">'+anvDisplay+'</span> · ':''}${leg.pilots.join('/')}${leg.fuel?' · '+leg.fuel+'t':''}</div></div>
        <div>${(()=>{
          let tipoLabel=leg.mission||'—';let cls='mission-tipo';
          if(leg.mission==='PERN'){
            cls+=' pern';
            const intlToday=missionsData.find(m=>m.inicio&&m.fim&&m.inicio<=td&&td<=m.fim);
            tipoLabel=intlToday?`${intlToday.tipo} 🌙`:'🌙 PERN';
          }
          return '<span class="'+cls+'">'+tipoLabel+'</span>';
        })()}</div></div>`;
    }
  }else{
    html+='<div class="no-data">Sem missões programadas para hoje.</div>';
  }
  // Show next days (week) inline
  // Próximos dias: coleta datas do diário + OMs futuras, OM tem prioridade
  const weekDays=diarioData.filter(d=>{const diff=(d.date-td)/(86400000);return diff>0&&diff<=7&&d.legs.length>0;});
  const tdMid=new Date(td);tdMid.setHours(12,0,0,0);
  const futureOMs=omData.filter(o=>{const od=new Date(o.data+'T12:00:00');const diff=(od-tdMid)/86400000;return diff>0&&diff<=7;});
  // Juntar todas as datas únicas
  const allDates=new Set();
  weekDays.forEach(d=>{const iso=d.date.getFullYear()+'-'+String(d.date.getMonth()+1).padStart(2,'0')+'-'+String(d.date.getDate()).padStart(2,'0');allDates.add(iso);});
  futureOMs.forEach(o=>allDates.add(o.data));
  const sortedDates=[...allDates].sort();
  if(sortedDates.length){
    html+='<div style="margin-top:16px;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px">Próximos Dias</div>';
    for(const isoDate of sortedDates){
      const dObj=new Date(isoDate+'T12:00:00');
      const dateStr=String(dObj.getDate()).padStart(2,'0')+'/'+String(dObj.getMonth()+1).padStart(2,'0');
      const dayName=dayNames[dObj.getDay()];
      const dayOMs=omData.filter(o=>o.data===isoDate);
      const dayDiario=weekDays.find(d=>{const di=d.date.getFullYear()+'-'+String(d.date.getMonth()+1).padStart(2,'0')+'-'+String(d.date.getDate()).padStart(2,'0');return di===isoDate;});
      if(dayOMs.length){
        // OM tem prioridade — mostra dados da OM
        for(const om of dayOMs){
          const anvColor=om.aeronave==='VC-1'?'var(--vc1)':'var(--vc2)';
          for(const p of om.pernas){
            html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)">
              <div style="min-width:70px;font-weight:900;color:var(--text)">${dateStr}</div>
              <div style="min-width:36px;font-size:.75rem;color:var(--text2)">${dayName}</div>
              <div style="min-width:80px;font-size:.82rem;color:${anvColor}">${om.fab}</div>
              <div style="flex:1;font-size:.82rem">${p.origem}→${p.destino} <span style="color:var(--text2);font-size:.72rem">${p.etd.split(' ')[1]||''}</span> <span style="color:var(--yellow);font-size:.72rem">${p.missao}</span></div>
              <div style="font-size:.6rem;color:var(--green)">📋 OM</div>
              </div>`;
          }
        }
      }else if(dayDiario){
        // Sem OM — mostra diário (rascunho)
        const anvLabel=dayDiario.aeronave&&dayDiario.aeronave!=='AERONAVE'?dayDiario.aeronave:'A DEFINIR';
        const mainLegs=dayDiario.legs.filter(l=>!l.isExtra);
        const extraLegs=dayDiario.legs.filter(l=>l.isExtra);
        if(mainLegs.length){
          html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)">
            <div style="min-width:70px;font-weight:900;color:var(--text)">${dateStr}</div>
            <div style="min-width:36px;font-size:.75rem;color:var(--text2)">${dayName}</div>
            <div style="min-width:80px;font-size:.82rem;color:var(--vc1)">${anvLabel}</div>
            <div style="flex:1;font-size:.82rem">${mainLegs.map(l=>'<span style="margin-right:12px">'+l.dep+' '+l.route.replace(/-/g,'→')+'</span>').join('')}</div>
            </div>`;
        }
        if(extraLegs.length){
          html+=`<div style="display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">
            <div style="min-width:70px"></div>
            <div style="min-width:36px"></div>
            <div style="min-width:80px;font-size:.82rem;color:var(--vc2)">FAB 2590</div>
            <div style="flex:1;font-size:.82rem;color:var(--vc2)">${extraLegs.map(l=>'<span style="margin-right:12px">'+l.dep+' '+l.route.replace(/-/g,'→')+'</span>').join('')}</div>
            </div>`;
        }
      }
    }
  }
  html+='</div>';

  // --- HORAS PROGRESSO ---
  html+='<div class="dash-panel p-hours" style="grid-column:1/-1">';
  html+='<div class="panel-title"><span class="icon">📊</span> Progresso Horas de Voo — Ano</div>';
  const yearStart=new Date(td.getFullYear(),0,1);const yearEnd=new Date(td.getFullYear(),11,31);
  const yearPct=((td-yearStart)/(yearEnd-yearStart)*100);
  html+=`<div style="font-size:.72rem;color:var(--text2);margin-bottom:12px">Progresso do ano: ${yearPct.toFixed(0)}% — Meta de voo hoje</div>`;
  
  // VC-1 — Dados da aba Anual (Aux Anual do Machado)
  const vc1V=anualVC1.voadas;const vc1M=anualVC1.esforco||650;
  const vc1Pct=vc1M>0?(vc1V/vc1M*100):0;const vc1C=vc1Pct<yearPct*0.8?'var(--red)':vc1Pct<yearPct?'var(--yellow)':'var(--green)';
  html+=`<div class="prog-section">
    <div class="prog-label"><span style="color:var(--vc1);font-weight:900">VC-1</span><span>${fmtHours(vc1V)} / ${fmtHours(vc1M)} <span style="color:${vc1C};font-weight:900">(${vc1Pct.toFixed(1)}%)</span></span></div>
    <div class="prog-track"><div class="prog-marker" style="left:${yearPct}%"></div><div class="prog-fill" style="width:${Math.min(vc1Pct,100)}%;background:linear-gradient(90deg,var(--vc1),${vc1C})" data-pct="${vc1Pct.toFixed(0)}%"></div></div></div>`;

  // VC-2 — Dados da aba Anual (Aux Anual)
  const vc2V=anualVC2.voadas;const vc2M=anualVC2.esforco||1220;
  const vc2Pct=vc2M>0?(vc2V/vc2M*100):0;const vc2C=vc2Pct<yearPct*0.8?'var(--red)':vc2Pct<yearPct?'var(--yellow)':'var(--green)';
  html+=`<div class="prog-section">
    <div class="prog-label"><span style="color:var(--vc2);font-weight:900">VC-2</span><span>${fmtHours(vc2V)} / ${fmtHours(vc2M)} <span style="color:${vc2C};font-weight:900">(${vc2Pct.toFixed(1)}%)</span></span></div>
    <div class="prog-track"><div class="prog-marker" style="left:${yearPct}%"></div><div class="prog-fill" style="width:${Math.min(vc2Pct,100)}%;background:linear-gradient(90deg,var(--vc2),${vc2C})" data-pct="${vc2Pct.toFixed(0)}%"></div></div></div>`;

  // Avisos 50% e 70% — Ofício ao GABAER
  const avisos=[];
  if(vc1Pct>=70)avisos.push({anv:'VC-1',pct:70,cur:vc1Pct});
  else if(vc1Pct>=50)avisos.push({anv:'VC-1',pct:50,cur:vc1Pct});
  if(vc2Pct>=70)avisos.push({anv:'VC-2',pct:70,cur:vc2Pct});
  else if(vc2Pct>=50)avisos.push({anv:'VC-2',pct:50,cur:vc2Pct});
  if(avisos.length){
    html+='<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">';
    avisos.forEach(a=>{
      const cor=a.pct>=70?'var(--red)':'var(--yellow)';
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid ${cor};background:rgba(${a.pct>=70?'255,68,68':'255,193,7'},0.08)">
        <span style="font-size:1.2rem">${a.pct>=70?'🚨':'⚠️'}</span>
        <div><div style="font-weight:900;color:${cor}">${a.anv} atingiu ${a.pct}% do esforço aéreo (${a.cur.toFixed(1)}%)</div>
        <div style="font-size:.72rem;color:var(--text2)">Ofício ao GABAER necessário</div></div></div>`;
    });
    html+='</div>';
  }
  html+='</div>';

  // --- PRÓXIMAS MISSÕES INTERNACIONAIS ---
  html+='<div class="dash-panel p-intl full-missions" style="grid-column:1/-1">';
  const td2=new Date(td);td2.setHours(0,0,0,0);
  const ongoing=missionsData.filter(m=>m.inicio&&m.fim&&m.inicio<=td2&&m.fim>=td2);
  const future=missionsData.filter(m=>m.inicio&&m.inicio>td2).sort((a,b)=>(a.inicio?.getTime()||0)-(b.inicio?.getTime()||0));
  const undated=missionsData.filter(m=>!m.inicio);
  const totalMiss=ongoing.length+future.length+undated.length;
  html+=`<div class="panel-title"><span class="icon">🌎</span> Próximas Missões Internacionais <span class="count">${totalMiss}</span></div>`;

  if(ongoing.length){
    html+='<div style="margin-bottom:12px;font-size:.75rem;color:var(--green);text-transform:uppercase;letter-spacing:1px;font-weight:700">Em andamento</div>';
    for(const m of ongoing){
      const anvCls=m.anv==='VC-1'?'vc1':'vc2';
      html+=`<div class="mission-card mission-ongoing" style="border-color:var(--green)">
        <div class="mission-anv ${anvCls}">${m.anv}</div>
        <div class="mission-body"><div class="mission-title">${m.pais}</div><div class="mission-sub">${m.motivo}</div></div>
        <div><span class="mission-tipo">${m.tipo||'—'}</span></div>
        <div class="mission-date"><div class="mission-date-main" style="color:var(--green)">EM CURSO</div><div class="mission-date-range">${m.inicioRaw} — ${m.fimRaw}</div></div></div>`;
    }
  }

  if(future.length){
    if(ongoing.length)html+='<div style="margin:14px 0 12px;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700">Programadas</div>';
    for(const m of future.slice(0,8)){
      const anvCls=m.anv==='VC-1'?'vc1':'vc2';
      const daysUntil=Math.ceil((m.inicio-td2)/(86400000));
      const urgColor=daysUntil<=7?'var(--red)':daysUntil<=30?'var(--yellow)':'var(--text)';
      html+=`<div class="mission-card">
        <div class="mission-anv ${anvCls}">${m.anv}</div>
        <div class="mission-body"><div class="mission-title">${m.pais}</div><div class="mission-sub">${m.motivo}</div></div>
        <div><span class="mission-tipo">${m.tipo||'—'}</span></div>
        <div class="mission-date"><div class="mission-date-main" style="color:${urgColor}">${daysUntil<=0?'HOJE':'em '+daysUntil+'d'}</div><div class="mission-date-range">${m.inicioRaw} — ${m.fimRaw}</div></div></div>`;
    }
  }

  if(undated.length){
    html+='<div style="margin:14px 0 12px;font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700">A definir</div>';
    for(const m of undated.slice(0,5)){
      const anvCls=m.anv==='VC-1'?'vc1':'vc2';
      html+=`<div class="mission-card" style="opacity:.7">
        <div class="mission-anv ${anvCls}">${m.anv}</div>
        <div class="mission-body"><div class="mission-title">${m.pais}</div><div class="mission-sub">${m.motivo}</div></div>
        <div><span class="mission-tipo">${m.tipo||'—'}</span></div>
        <div class="mission-date"><div class="mission-date-main" style="color:var(--text2)">A DEFINIR</div></div></div>`;
    }
  }

  if(!totalMiss)html+='<div class="no-data">Nenhuma missão internacional programada.</div>';
  html+='</div>';

  html+='</div>'; // close dash-layout
  document.getElementById('screen0').innerHTML=html;
}

// ===== HORAS DE VOO =====
function renderScreen2(){
  const renderCol=(title,pilots,h2Class)=>{
    const withHours=pilots.filter(p=>p.voadas!=null&&p.voadas>0);
    const sorted=[...withHours].sort((a,b)=>(b.voadas||0)-(a.voadas||0));
    let html=`<div><h2 class="${h2Class}">${title}</h2>`;
    for(let i=0;i<sorted.length;i++){
      const p=sorted[i];const pct=(p.pct??0);const hasMeta=p.meta!=null&&p.meta>0;
      const total=sorted.length;
      const barColor=i<3?'var(--green)':i>=total-1?'var(--red)':i>=total-3?'#ff8c42':'var(--yellow)';
      const rankColor=i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#667';
      const borderColor=i<3?rankColor:i>=total-1?'var(--red)':'transparent';
      const rank=`<span style="display:inline-block;width:34px;text-align:right;font-size:.82rem;color:${rankColor};flex-shrink:0;padding-right:6px;font-weight:${i<3?'900':'400'}">${i+1}º</span>`;
      const pctLabel=hasMeta?`${pct.toFixed(1)}%`:'—';
      const hoursLabel=hasMeta?`${fmtHours(p.voadas)}/${Math.round(p.meta)}h`:fmtHours(p.voadas);
      const barWidth=hasMeta?Math.min(Math.max(pct,0),100):0;
      const barHtml=hasMeta?`<div class="bar-track"><div class="bar-fill" style="width:${barWidth}%;background:${barColor}"></div></div>`:`<div class="bar-track" style="opacity:.3"></div>`;
      html+=`<div class="bar-row" style="border-left:3px solid ${borderColor};padding-left:6px">${rank}<span class="bar-label">${p.trigrama}</span>${barHtml}<span class="bar-pct" style="color:${hasMeta?barColor:'var(--text2)'}">${pctLabel}</span><span class="bar-hours">${hoursLabel}</span></div>`;
    }
    const others=pilots.filter(p=>p.voadas==null||p.voadas===0);
    if(others.length){html+='<h3 style="font-size:.85rem;color:#556;">Sem dados de horas</h3>';for(const p of others)html+=`<div class="bar-row"><span class="bar-label" style="color:#667">${p.trigrama}</span><span class="bar-name" style="color:#556">${p.name||''}</span><span style="color:#556;font-size:.8rem">${p.grupo||''}</span></div>`;}
    return html+'</div>';
  };
  document.getElementById('screen2').innerHTML='<h2>Horas de Voo — Ranking</h2><div class="hours-cols">'+renderCol('VC-1',pilotData.vc1,'')+renderCol('VC-2',pilotData.vc2,'vc2')+'</div>';
}

  else{
    const nowList=feriasData.filter(f=>f.inicio<=td&&td<=f.fim).sort((a,b)=>a.fim-b.fim);
    const upcoming=feriasData.filter(f=>f.inicio>td).sort((a,b)=>a.inicio-b.inicio);
    html+='<h3 style="border:none;margin:10px 0 8px">🏖 Em férias hoje</h3>';

    else html+='<div class="no-data" style="padding:10px 0">Nenhum piloto em férias hoje.</div>';
    html+='<h3 style="border:none;margin:10px 0 8px">📅 Próximas férias</h3>';
    if(upcoming.length){for(const f of upcoming){const diasP=Math.ceil((f.inicio-td)/(86400000));html+=`<div class="alert-card vacation"><div class="alert-icon" style="color:var(--text2)">F</div><div><strong>${f.trigrama}</strong> — ${fmtDate(f.inicio)} a ${fmtDate(f.fim)} <span style="font-size:.75rem;color:var(--text2)">(em ${diasP}d)</span></div></div>`;}}
    else html+='<div class="no-data" style="padding:10px 0">Nenhuma férias programada.</div>';
  }
  html+='</div>';
  const alerts=[];const allPilots=[...pilotData.vc1,...pilotData.vc2];
  for(const p of allPilots){
    if(String(p.grupo).toUpperCase()==='OUT')continue;
    if(p.cviDate){if(p.cviDate<td)alerts.push({type:'danger',text:`${p.trigrama} — CVI vencido em ${p.cvi}`});else if(p.cviDate<in30)alerts.push({type:'warning',text:`${p.trigrama} — CVI vence em ${p.cvi}`});}
    if(p.inspSauDate){if(p.inspSauDate<td)alerts.push({type:'danger',text:`${p.trigrama} — INSP SAU vencido em ${p.inspSau}`});else if(p.inspSauDate<in30)alerts.push({type:'warning',text:`${p.trigrama} — INSP SAU vence em ${p.inspSau}`});}
    const afNum2=parseInt(String(p.afastamento||'').replace(/[^0-9\-]/g,''),10);
    const afAbs2=!isNaN(afNum2)?Math.abs(afNum2):NaN;
    if(!isNaN(afAbs2)&&afAbs2>=35)alerts.push({type:'danger',text:`${p.trigrama} — DESADAPTADO (${afAbs2} dias)`});
    else if(!isNaN(afAbs2)&&afAbs2>=20)alerts.push({type:'warning',text:`${p.trigrama} — Desadaptado PR (${afAbs2} dias)`});
  }
  html+='<div class="alert-section"><h3>Alertas (30 dias)</h3>';
  if(alerts.length){for(const a of alerts){const color=a.type==='danger'?'var(--red)':'var(--yellow)';html+=`<div class="alert-card ${a.type}"><div class="alert-icon" style="color:${color}">!</div><div>${a.text}</div></div>`;}}
  else html+='<div class="no-data">Nenhum alerta encontrado para os próximos 30 dias.</div>';
  html+='</div>';
  const last7=new Date(td);last7.setDate(last7.getDate()-7);const recent=flights.filter(f=>f.dataObj&&f.dataObj>=last7);
  html+='<div class="alert-section"><h3>Resumo Últimos 7 Dias</h3>';
  if(recent.length){const byPilot={};for(const f of recent)byPilot[f.piloto]=(byPilot[f.piloto]||0)+1;const sorted=Object.entries(byPilot).sort((a,b)=>b[1]-a[1]);
    html+=`<div class="alert-card info"><div class="alert-icon" style="color:var(--vc1)">i</div><div>${recent.length} voos no total</div></div>`;
    for(const[tri,c]of sorted.slice(0,10))html+=`<div class="alert-card info"><div class="alert-icon" style="color:var(--vc1)">${c}</div><div>${tri} — ${c} voo(s)</div></div>`;}
  else html+='<div class="no-data">Nenhum voo nos ultimos 7 dias.</div>';
  html+='</div>';
  document.getElementById('screen3').innerHTML=html;
}

function parseACNT(rows){
  if(!rows||rows.length<5)return[];
  // Find mission groups: row index 1 has dates in pattern "DATA:, DD/MM/YYYY"
  // Each mission occupies 3 columns (status, item, blank separator)
  const dateRow=rows[1]||[];
  const anvRow=rows[3]||[];
  const numRow=rows[4]||[];
  const missions=[];
  // Find date columns: look for "DATA:" markers
  for(let c=0;c<dateRow.length;c++){
    if(String(dateRow[c]||'').trim().toUpperCase()==='DATA:'){
      const dateStr=String(dateRow[c+1]||'').trim();
      if(!dateStr.match(/\d{2}\/\d{2}\/\d{4}/))continue;
      // ANV info at same column group
      const anvLabel=String(anvRow[c]||'').trim()||'ANV';
      const anvNum=String(numRow[c]||'').trim();
      const anvType=String(numRow[c+1]||'').trim();
      // Parse checklist items from row 5 onward
      const items=[];
      let lastDataRowIdx=-1;
      for(let r=5;r<rows.length;r++){
        const row=rows[r];
        const status=String(row[c]||'').trim().toUpperCase();
        const name=String(row[c+1]||'').trim();
        if(!name)continue;
        // Check if this is the percentage row (contains % sign)
        if(name.includes('%')||status.includes('%')){lastDataRowIdx=r;continue;}
        if(status==='BRC'||status==='NIL'||status===''){
          items.push({name,status:status==='BRC'?'done':'pending'});
        }
      }
      // Parse percentages from last row
      const lastRow=rows[rows.length-1]||[];
      let pctDone=0,pctPending=100;
      // Percentages are in format "86,96%" at column c and c+1
      const rawDone=String(lastRow[c]||'').replace('%','').replace(',','.').trim();
      const rawPend=String(lastRow[c+1]||'').replace('%','').replace(',','.').trim();
      const pd=parseFloat(rawDone);const pp=parseFloat(rawPend);
      if(!isNaN(pd))pctDone=pd;
      if(!isNaN(pp))pctPending=pp;
      // If pctDone is 0 but items have done statuses, calculate from items
      if(pctDone===0&&items.length){
        const done=items.filter(i=>i.status==='done').length;
        pctDone=Math.round(done/items.length*10000)/100;
        pctPending=Math.round((items.length-done)/items.length*10000)/100;
      }
      const dateObj=parseDateBR(dateStr);
      missions.push({data:dateStr,dataObj:dateObj,anv:anvLabel,anvNum,anvType,items,pctDone,pctPending});
    }
  }
  // Sort by date, most recent first
  missions.sort((a,b)=>(b.dataObj?.getTime()||0)-(a.dataObj?.getTime()||0));
  return missions;
}

function parseChecklist(rows){
  // Checklist is in columns 0-1, rows ~4-38
  // Col 0: trigram of person who did it (empty = pending)
  // Col 1: task description
  // Skip rows that look like flight headers (contain "Local", "Origem", "DEP")
  const items=[];
  const skipWords=['Local','Origem','DEP','Comb','Pilotos','Missão'];
  let started=false;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    const c0=String(row[0]||'').trim();
    const c1=String(row[1]||'').trim();
    // Start after the header rows (row 0-2 are header/date/aeronave)
    if(r<3)continue;
    // Skip flight data rows
    if(!c1||skipWords.some(w=>c1.includes(w)))continue;
    // Skip rows that are clearly flight leg data (c0 looks like a time)
    if(c0.match(/^\d{4}$/)||c0==='A DET')continue;
    // This is a checklist item
    items.push({resp:c0,task:c1,done:c0!==''});
  }
  return items;
}

let calYear, calMonth;
(function(){const t=nowBRT();calYear=t.getFullYear();calMonth=t.getMonth();})();

function renderScreenCalendar(){
  const td=nowBRT();
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dayNames=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  
  let html='<div class="cal-nav">';
  html+=`<button onclick="calPrev()">◀</button>`;
  html+=`<div class="cal-month">${monthNames[calMonth]} ${calYear}</div>`;
  html+=`<button onclick="calNext()">▶</button>`;
  html+='</div>';
  
  html+='<div class="cal-grid">';
  dayNames.forEach(d=>html+=`<div class="cal-header">${d}</div>`);
  
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  
  // Build events map: day -> events[]
  const events={};
  const addEvent=(day,text,cls)=>{if(!events[day])events[day]=[];if(!events[day].some(e=>e.text===text&&e.cls===cls))events[day].push({text,cls});};
  
  // Domestic flights for this month
  flights.forEach(f=>{
    if(!f.data)return;
    const parts=f.data.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if(!parts)return;
    const fDay=parseInt(parts[1]),fMon=parseInt(parts[2])-1,fYear=parseInt(parts[3]);
    if(fMon===calMonth&&fYear===calYear){
      const label=`${f.anv||''} ${f.missao||''}`.trim();
      addEvent(fDay,label||f.data,'ev-mission');
    }
  });
  
  // International missions
  missionsData.forEach(m=>{
    if(!m.pais)return;
    if(m.inicio){
      const sd=new Date(m.inicio);
      const ed=m.fim?new Date(m.fim):sd;
      for(let d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){
        if(d.getMonth()===calMonth&&d.getFullYear()===calYear){
          addEvent(d.getDate(),`🌍 ${m.pais}`,'ev-intl');
        }
      }
    }
  });
  
  // Férias
  feriasData.forEach(f=>{
    const s=f.inicio,e=f.fim;
    if(!s||!e)return;
    const sd=new Date(s),ed=new Date(e);
    for(let d=new Date(sd);d<=ed;d.setDate(d.getDate()+1)){
      if(d.getMonth()===calMonth&&d.getFullYear()===calYear){
        addEvent(d.getDate(),`🏖 ${f.trigrama||f.tri||'?'}`,'ev-ferias');
      }
    }
  });
  
  // Prev month padding
  for(let i=firstDay-1;i>=0;i--){
    const day=daysInPrev-i;
    html+=`<div class="cal-day other-month"><div class="day-num">${day}</div></div>`;
  }
  
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const isToday=(d===td.getDate()&&calMonth===td.getMonth()&&calYear===td.getFullYear());
    html+=`<div class="cal-day${isToday?' today':''}"><div class="day-num">${d}</div>`;
    if(events[d]){
      events[d].slice(0,3).forEach(ev=>{
        html+=`<div class="cal-event ${ev.cls}" title="${ev.text}">${ev.text}</div>`;
      });
      if(events[d].length>3)html+=`<div style="font-size:.55rem;color:var(--text2)">+${events[d].length-3} mais</div>`;
    }
    html+='</div>';
  }
  
  // Next month padding
  const totalCells=firstDay+daysInMonth;
  const remaining=totalCells%7===0?0:7-(totalCells%7);
  for(let d=1;d<=remaining;d++){
    html+=`<div class="cal-day other-month"><div class="day-num">${d}</div></div>`;
  }
  
  html+='</div>';
  document.getElementById('screen6').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderScreenCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderScreenCalendar();}

    html+=`<div><div style="font-weight:700">${ct.nome||'—'}</div><div class="sc-name">${ct.funcao||''} · ${ct.anv||''}</div></div>`;
    html+=`<div class="sc-status" style="background:${stBg};color:${stColor};border:1px solid ${stColor}">${stLabel}</div>`;

    // Férias — filtrar por aeronave quando trigrama duplicado
    const ctTriDup=cartoesData.filter(c=>c.trigrama===ct.trigrama).length>1;
    const ctAnv=(ct.aeronave||ct.anv||'').replace('-','').toUpperCase();
    const ctFerias=feriasData.filter(f=>{
      if(f.trigrama!==ct.trigrama||f.fim<td)return false;
      if(ctTriDup&&ctAnv){const fAnv=(f.anv||'').replace('-','').toUpperCase();if(fAnv&&fAnv!==ctAnv)return false;}

    if(ctFerias.length){

async function fetchEscalaCSV(sheetName){
  const url=`https://docs.google.com/spreadsheets/d/${ESCALA_SHEET}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const r=await fetch(url,{cache:'no-store'});if(!r.ok)return[];return parseCSV(await r.text());
}
async function fetchEscala(){
  try{
    const [c1,c2,r1,r2,sav]=await Promise.all([
      fetchEscalaCSV('Consulta VC-1'),fetchEscalaCSV('Consulta VC-2'),
      fetchEscalaCSV('Raio Final VC-1'),fetchEscalaCSV('Raio Final VC-2'),
      fetchEscalaCSV('SAVISO')]);
    escalaData.vc1.consulta=c1.length?String(c1[0][0]||''):'';
    escalaData.vc2.consulta=c2.length?String(c2[0][0]||''):'';
    const parseRaio=(rows)=>{
      if(!rows.length)return[];
      // Header row has mission columns starting at col6 (A,B,C...)
      const hdr=rows[0];const missions=[];
      for(let i=6;i<hdr.length;i++){const v=String(hdr[i]||'').trim();if(v&&v.length<=2)missions.push({idx:i,label:v});else break;}
      const pilots=[];
      for(let r=1;r<rows.length;r++){
        const row=rows[r];const name=String(row[3]||'').trim();if(!name||name==='X')continue;
        const qual=String(row[4]||'').trim();const op=String(row[5]||'').trim();
        const reason=String(row[16]||'').trim();
        const responses={};let answered=false;
        for(const m of missions){
          const v=String(row[m.idx]||'').trim();
          responses[m.label]=v;if(v)answered=true;
        }
        pilots.push({name,qual,op,reason,responses,answered});
      }
      return pilots;
    };
    escalaData.vc1.raio=parseRaio(r1);
    escalaData.vc2.raio=parseRaio(r2);
    // Extract mission labels from header
    const getMissions=(rows)=>{
      if(!rows.length)return[];
      const hdr=rows[0];const m=[];
      for(let i=6;i<hdr.length;i++){const v=String(hdr[i]||'').trim();if(v&&v.length<=2)m.push(v);else break;}
      return m;
    };
    escalaData.vc1.missions=getMissions(r1);
    escalaData.vc2.missions=getMissions(r2);
    // Parse SAVISO (confirmed missions)
    confirmaData=[];
    if(sav.length>1){
      for(let i=1;i<sav.length;i++){
        const row=sav[i];
        const dia=String(row[1]||'').trim();if(!dia)continue;
        const escalados=String(row[2]||'').trim().split('\n').map(s=>s.trim()).filter(Boolean);
        const anv=String(row[8]||'').trim();
        const num=String(row[9]||'').trim();
        const letra=String(row[10]||'').trim();
        if(escalados.length)confirmaData.push({dia,escalados,anv,num,letra});
      }
    }
  }catch(e){console.warn('fetchEscala error',e);}
}

function renderScreenEscala(){
  let html='<h2>📋 Escalação de Missões</h2>';

  if(confirmaData.length){

    const dateInfo=[];
    [escalaData.vc1.consulta,escalaData.vc2.consulta].forEach(c=>{
      if(!c)return;const m=c.match(/dias?\s+([\d,\s]+e?\s*\d*)\s+de\s+(\w+)/i);

      html+=`</div>`;
    }
    html+=`</div>`;

  const renderAnv=(label,data,colorVar)=>{
    html+=`<div style="margin-bottom:24px">`;
    html+=`<h3 style="color:var(${colorVar});border-bottom:2px solid var(${colorVar});padding-bottom:6px">${label}</h3>`;

    }
    
    const missions=data.missions||[];
    const pilots=data.raio||[];
    if(!pilots.length){html+=`<div class="no-data">Sem dados de escalação.</div></div>`;return;}
    
    // Stats
    const total=pilots.length;
    const responded=pilots.filter(p=>p.answered).length;
    const pending=total-responded;
    html+=`<div style="display:flex;gap:16px;margin-bottom:12px;font-size:.82rem">`;
    html+=`<span>👥 ${total} pilotos</span>`;
    html+=`<span style="color:var(--green)">✅ ${responded} responderam</span>`;
    html+=`<span style="color:var(--yellow)">⏳ ${pending} pendentes</span>`;
    html+=`</div>`;
    
    // Matrix table
    if(missions.length){
      html+=`<div style="overflow-x:auto;margin-bottom:16px"><table style="width:100%;border-collapse:collapse;font-size:.78rem">`;
      html+=`<thead><tr style="border-bottom:2px solid var(--border)">`;
      html+=`<th style="text-align:left;padding:8px 6px;color:var(--text2);min-width:140px">Piloto</th>`;
      html+=`<th style="text-align:center;padding:8px 4px;color:var(--text2);width:40px">Qual.</th>`;
      for(const m of missions)html+=`<th style="text-align:center;padding:8px 4px;color:var(${colorVar});font-weight:900;width:36px">${m}</th>`;
      html+=`<th style="text-align:left;padding:8px 6px;color:var(--text2)">Obs</th>`;
      html+=`</tr></thead><tbody>`;
      
      for(const p of pilots){
        html+=`<tr style="border-bottom:1px solid rgba(255,255,255,.05)">`;
        html+=`<td style="padding:6px;font-weight:700">${p.name}</td>`;
        html+=`<td style="text-align:center;padding:6px;font-size:.72rem;color:var(--text2)">${p.qual}</td>`;
        for(const m of missions){
          const v=p.responses[m]||'';
          let bg='',color='var(--text2)',display=v||'—';
          if(v&&v!=='-'){
            // Number = wants it
            bg='rgba(0,255,136,.15)';color='var(--green)';display=v;
          }else if(v==='-'){
            bg='rgba(255,80,80,.1)';color='var(--red)';display='✗';
          }else{
            bg='';color='rgba(255,255,255,.2)';display='—';
          }
          html+=`<td style="text-align:center;padding:6px;background:${bg};color:${color};font-weight:900;border-radius:4px">${display}</td>`;
        }
        html+=`<td style="padding:6px;font-size:.72rem;color:var(--text2)">${p.reason||''}</td>`;
        html+=`</tr>`;
      }
      html+=`</tbody></table></div>`;
    }
    

    
    // Pendentes
    const pendList=pilots.filter(p=>!p.answered);
    if(pendList.length){
      html+=`<div style="margin-top:12px;padding:10px;background:rgba(255,200,50,.06);border:1px solid rgba(255,200,50,.2);border-radius:8px">`;
      html+=`<div style="font-size:.78rem;font-weight:700;color:var(--yellow);margin-bottom:4px">⏳ Aguardando resposta (${pendList.length})</div>`;
      html+=`<div style="font-size:.75rem;color:var(--text2)">${pendList.map(p=>p.name.split('(')[0].trim()).join(' · ')}</div>`;
      html+=`</div>`;
    }
    
    html+=`</div>`;
  };
  
  renderAnv('VC-1',escalaData.vc1,'--vc1');
  renderAnv('VC-2',escalaData.vc2,'--vc2');
  
  document.getElementById('screen8').innerHTML=html;
}

const MESES_PT={'jan':0,'fev':1,'mar':2,'abr':3,'mai':4,'jun':5,'jul':6,'ago':7,'set':8,'out':9,'nov':10,'dez':11};
function parseDateCartao(s){
  if(!s)return null;
  const str=String(s).trim();
  if(!str||str==='---'||str==='#N/A'||str==='#REF!'||str==='#VALUE!')return null;
  // Format: "29/set./26" or "08/ago./26"
  const m1=str.match(/^(\d{1,2})\/(jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez)\.?\/(\d{2,4})$/i);
  if(m1){
    const day=parseInt(m1[1],10);const mon=MESES_PT[m1[2].toLowerCase()];
    let yr=parseInt(m1[3],10);if(yr<100)yr+=2000;
    return new Date(yr,mon,day);
  }
  // Format: "dd/mm/yyyy"
  const m2=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m2)return new Date(parseInt(m2[3],10),parseInt(m2[2],10)-1,parseInt(m2[1],10));
  // Format: "dd/mm/yy"
  const m3=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(m3){let yr=parseInt(m3[3],10);yr+=yr<50?2000:1900;return new Date(yr,parseInt(m3[2],10)-1,parseInt(m3[1],10));}
  return null;
}
function parseCartoes(rows){
  const EXCLUIDOS=['BEH','SOZ'];
  const result=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const trigrama=String(r[29]||'').trim().toUpperCase();
    if(!trigrama||EXCLUIDOS.includes(trigrama))continue;
    const funcao=String(r[30]||'').trim();
    if(!funcao)continue;
    result.push({
      postoGrad:String(r[27]||'').trim(),
      nome:String(r[28]||'').trim(),
      trigrama,
      funcao,
      aeronave:String(r[31]||'').trim(),
      inspSaude:{raw:String(r[36]||'').trim(),date:parseDateCartao(r[36])},
      estFisio:{raw:String(r[37]||'').trim(),date:parseDateCartao(r[37])},
      crm:{raw:String(r[38]||'').trim(),date:parseDateCartao(r[38])},
      simulador:{raw:String(r[39]||'').trim(),date:parseDateCartao(r[39])},
      cviRvsm:{raw:String(r[40]||'').trim(),date:parseDateCartao(r[40])},
      ilsCat:{raw:String(r[41]||'').trim(),date:parseDateCartao(r[41])},
      ctaiS1:{raw:String(r[42]||'').trim(),date:parseDateCartao(r[42])},
      ctaiS:{raw:String(r[43]||'').trim(),date:parseDateCartao(r[43])},
      tdie:{raw:String(r[44]||'').trim(),date:parseDateCartao(r[44])},
      icao:{raw:String(r[45]||'').trim(),date:parseDateCartao(r[45])},
      taiProva:{raw:String(r[46]||'').trim(),date:parseDateCartao(r[46])},
      taiVoo:{raw:String(r[47]||'').trim(),date:parseDateCartao(r[47])},
      passaporte:{raw:String(r[48]||'').trim(),date:parseDateCartao(r[48])},
      cOperacional:{raw:String(r[49]||'').trim(),date:parseDateCartao(r[49])},
    });
  }
  return result;
}
function cartaoColor(cartao,hoje){
  if(!cartao||!cartao.raw||cartao.raw==='---'||cartao.raw==='')return{cls:'cinza',label:'N/A',color:'#555',bg:'rgba(80,80,80,.15)'};
  if(!cartao.date)return{cls:'cinza',label:cartao.raw,color:'#888',bg:'rgba(80,80,80,.15)'};
  const diff=(cartao.date-hoje)/(1000*60*60*24);
  if(diff<0)return{cls:'vermelho',label:cartao.raw,color:'var(--red)',bg:'rgba(255,68,68,.15)',days:Math.round(diff)};
  if(diff<30)return{cls:'vermelho',label:cartao.raw,color:'var(--red)',bg:'rgba(255,68,68,.15)',days:Math.round(diff)};
  if(diff<60)return{cls:'amarelo',label:cartao.raw,color:'var(--yellow)',bg:'rgba(255,170,0,.15)',days:Math.round(diff)};
  return{cls:'verde',label:cartao.raw,color:'var(--green)',bg:'rgba(0,255,136,.15)',days:Math.round(diff)};
}

}

// Decode WX field (same as bot _decode_wx_field)
function decodeWxField(p){
  const wm=p.match(/^(VRB|\d{3})(\d{2,3})(G(\d{2,3}))?KT$/);
  if(wm){const d=wm[1]==='VRB'?'variável':wm[1]+'°';const g=wm[4]?` rajada ${wm[4]}kt`:'';return `💨 Vento: ${d} / ${wm[2]}kt${g}`;}
  if(/^\d{4}$/.test(p)&&p!=='CAVOK'){const v=parseInt(p);return v>=9999?'👁 Visibilidade: 10km+':`👁 Visibilidade: ${v}m`;}
  if(p==='CAVOK')return '👁 CAVOK (céu claro, vis 10km+)';
  const cm=p.match(/^(FEW|SCT|BKN|OVC|VV)(\d{3})(CB|TCU)?$/);
  if(cm){const cov={FEW:'Poucas',SCT:'Esparsas',BKN:'Nublado',OVC:'Encoberto',VV:'Vertical vis'};return `☁️ Nuvens: ${cov[cm[1]]||cm[1]} a ${parseInt(cm[2])*100}ft${cm[3]?' ('+cm[3]+')':''}`;}
  if(p==='NSC')return '☁️ Sem nuvens significativas';
  const wxCd={RA:'Chuva',DZ:'Chuvisco',SN:'Neve',GR:'Granizo',GS:'Granizo pequeno',PL:'Pelotas de gelo',SG:'Grãos de neve',TS:'Trovoada',FG:'Nevoeiro',BR:'Neblina',HZ:'Névoa seca',SH:'Pancada',FZ:'Congelante',MI:'Rasa',BC:'Bancos',BL:'Soprada',DR:'Rasteira',SA:'Areia',DU:'Poeira',FU:'Fumaça',VA:'Cinza vulcânica',SQ:'Rajada',FC:'Tornado',SS:'Temp. de areia',DS:'Temp. de poeira',PO:'Redemoinhos',UP:'Precip. desconhecida',IC:'Cristais de gelo'};
  if(['RA','DZ','SN','GR','TS','FG','BR','HZ','SH','BL','DR','FZ','SA','DU','FU','VA','FC','SS','DS','PL','SG','GS','IC','UP'].some(c=>p.includes(c))){
    const parts=[];let r=p;if(r[0]==='+'){parts.push('Forte');r=r.slice(1);}else if(r[0]==='-'){parts.push('Fraca');r=r.slice(1);}
    if(r.startsWith('VC')){parts.push('Nas proximidades');r=r.slice(2);}
    while(r.length>=2){const c=r.slice(0,2);if(wxCd[c])parts.push(wxCd[c]);r=r.slice(2);}
    return parts.length?`⛈ Tempo: ${parts.join(' ')}`:null;
  }
  return null;
}
function decodeTaf(raw){
  if(!raw||!raw.trim())return 'Indisponível';
  const tokens=raw.trim().replace(/\n/g,' ').split(/\s+/);
  const out=[];let i=0;
  while(i<tokens.length){
    const p=tokens[i];
    if(['TAF','AMD','COR'].includes(p)){i++;continue;}
    if(i<=2&&/^[A-Z]{4}$/.test(p)&&p!=='CAVOK'){i++;continue;}
    if(/^\d{6}Z$/.test(p)){i++;continue;}
    const vm=p.match(/^(\d{4})\/(\d{4})$/);
    if(vm){out.push(`📅 Validade: dia ${vm[1].slice(0,2)} ${vm[1].slice(2)}Z até dia ${vm[2].slice(0,2)} ${vm[2].slice(2)}Z`);i++;continue;}
    const fm=p.match(/^FM(\d{2})(\d{2})(\d{2})?$/);
    if(fm){out.push(`\n📌 A partir de ${fm[1]}:${fm[2]}Z:`);i++;continue;}
    if(p==='NSW'){out.push('  ✅ Sem tempo significativo');i++;continue;}
    if(p==='BECMG'||p==='TEMPO'||p.startsWith('PROB')){
      const ct={BECMG:'🔄 Mudança gradual',TEMPO:'⚡ Temporário'};const lbl=ct[p]||`📊 ${p}`;
      if(i+1<tokens.length&&/^\d{4}\/\d{4}$/.test(tokens[i+1])){const pr=tokens[i+1];out.push(`\n${lbl} (dia ${pr.slice(0,2)} ${pr.slice(2,4)}Z a dia ${pr.slice(5,7)} ${pr.slice(7)}Z):`);i+=2;continue;}
      out.push(`\n${lbl}:`);i++;continue;
    }
    if(p.startsWith('TX')||p.startsWith('TN')){out.push(`🌡 Temp. ${p.startsWith('TX')?'Máxima':'Mínima'}: ${p}`);i++;continue;}
    const f=decodeWxField(p);if(f){out.push(`  ${f}`);i++;continue;}
    i++;
  }
  return out.length?out.join('\n'):raw;
}
function formatDecodedMetar(d){
  let lines=[];
  if(d.time)lines.push(`📅 ${d.time}`);
  if(d.wind)lines.push(`💨 Vento: ${d.wind}`);
  if(d.vis)lines.push(`👁 Visibilidade: ${d.vis}`);

  if(d.qnh)lines.push(`📊 QNH: ${d.qnh}`);
  return lines.join('\n');
}

// Haversine (NM)
function haversine(lat1,lon1,lat2,lon2){
  const R=3440.065,toRad=Math.PI/180;
  const dLat=(lat2-lat1)*toRad,dLon=(lon2-lon1)*toRad;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}
function roundUp5(min){return Math.ceil(min/5)*5;}
function formatTime(h){const m=roundUp5(h*60);return `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}min`;}
